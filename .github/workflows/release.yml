name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package:
    name: Package (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            command: npx electron-builder --mac dmg --publish never
            artifact_glob: release/*.dmg
          - os: windows-latest
            platform: win
            command: npx electron-builder --win nsis --publish never
            artifact_glob: release/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable long paths on Windows
        if: matrix.os == 'windows-latest'
        run: git config --global core.longpaths true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync package version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: >
          node -e "const fs=require('fs');
          const pkgPath='package.json';
          const pkg=JSON.parse(fs.readFileSync(pkgPath,'utf8'));
          const version=(process.env.GITHUB_REF_NAME||'').replace(/^v/,'');
          if(!version){throw new Error('Missing GITHUB_REF_NAME');}
          pkg.version=version;
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          console.log('Synced package version to', version);"

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build SenseVoice backend
        run: npm run build:sensevoice-backend

      - name: Build app
        run: npm run build

      - name: Package app
        run: ${{ matrix.command }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: yobi-${{ matrix.platform }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
