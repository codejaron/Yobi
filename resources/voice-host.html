<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Yobi Voice Host</title>
  </head>
  <body>
    <script>
      (() => {
        console.info("voice-host:script-start");
        const voiceHost = window.voiceHost;
        if (!voiceHost || typeof voiceHost.onCommand !== "function" || typeof voiceHost.emit !== "function") {
          console.error("voice-host:missing-api", {
            hasVoiceHost: Boolean(voiceHost),
            hasOnCommand: Boolean(voiceHost && voiceHost.onCommand),
            hasEmit: Boolean(voiceHost && voiceHost.emit)
          });
          return;
        }
        console.info("voice-host:api-ready");
        let captureStream = null;
        let captureContext = null;
        let captureSource = null;
        let captureNode = null;
        let playbackQueue = [];
        let activePlayback = null;
        let playbackContext = null;
        let playbackAnalyser = null;
        let playbackSource = null;
        let playbackTapNode = null;
        let playbackData = null;
        let playbackReferenceEmitter = null;
        let playbackRaf = 0;
        const PCM_OUTPUT_RATE = 16000;
        const PCM_FRAME_SAMPLES = 320;

        const floatToInt16 = (input) => {
          const output = new Int16Array(input.length);
          for (let index = 0; index < input.length; index += 1) {
            const value = Math.max(-1, Math.min(1, input[index] || 0));
            output[index] = value < 0 ? Math.round(value * 0x8000) : Math.round(value * 0x7fff);
          }
          return output;
        };

        const createRealtimePcmEmitter = (eventType, inputRate, outputRate = PCM_OUTPUT_RATE) => {
          let pendingInput = [];
          let pendingOutput = [];
          let consumedInputSamples = 0;
          let emittedOutputSamples = 0;

          const flushFrames = () => {
            while (pendingOutput.length >= PCM_FRAME_SAMPLES) {
              const frame = new Float32Array(pendingOutput.splice(0, PCM_FRAME_SAMPLES));
              const pcm16 = floatToInt16(frame);
              emit({
                type: eventType,
                pcm: Array.from(new Uint8Array(pcm16.buffer)),
                sampleRate: outputRate
              });
            }
          };

          return {
            push(floatChunk) {
              if (!floatChunk || floatChunk.length === 0) {
                return;
              }

              for (let index = 0; index < floatChunk.length; index += 1) {
                pendingInput.push(floatChunk[index] || 0);
              }

              const ratio = inputRate / outputRate;
              while (true) {
                const boundaryAbs = Math.floor((emittedOutputSamples + 1) * ratio);
                const windowLength = boundaryAbs - consumedInputSamples;
                if (windowLength <= 0 || windowLength > pendingInput.length) {
                  break;
                }

                let total = 0;
                for (let index = 0; index < windowLength; index += 1) {
                  total += pendingInput[index] || 0;
                }

                pendingOutput.push(windowLength > 0 ? total / windowLength : 0);
                pendingInput.splice(0, windowLength);
                consumedInputSamples = boundaryAbs;
                emittedOutputSamples += 1;
              }

              flushFrames();
            },
            reset() {
              pendingInput = [];
              pendingOutput = [];
              consumedInputSamples = 0;
              emittedOutputSamples = 0;
            }
          };
        };

        const emit = (payload, transfer = []) => {
          if (transfer && transfer.length > 0) {
            voiceHost.emit({
              ...payload,
              pcm: payload.pcm
            });
            return;
          }

          voiceHost.emit(payload);
        };

        const clearPlaybackMonitor = async () => {
          if (playbackRaf) {
            cancelAnimationFrame(playbackRaf);
            playbackRaf = 0;
          }

          playbackData = null;
          playbackAnalyser = null;
          playbackReferenceEmitter?.reset?.();
          playbackReferenceEmitter = null;

          if (playbackSource) {
            try {
              playbackSource.disconnect();
            } catch {}
          }
          playbackSource = null;

          if (playbackTapNode) {
            try {
              playbackTapNode.port.onmessage = null;
              playbackTapNode.disconnect();
            } catch {}
          }
          playbackTapNode = null;

          if (playbackContext) {
            try {
              await playbackContext.close();
            } catch {}
          }
          playbackContext = null;
        };

        const stopActivePlayback = async () => {
          if (!activePlayback) {
            await clearPlaybackMonitor();
            return;
          }

          try {
            activePlayback.audio.pause();
            activePlayback.audio.src = "";
            activePlayback.audio.load();
          } catch {}

          activePlayback = null;
          await clearPlaybackMonitor();
        };

        const startPlaybackMonitor = async (item) => {
          const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextCtor) {
            return;
          }

          try {
            playbackContext = new AudioContextCtor();
            playbackAnalyser = playbackContext.createAnalyser();
            playbackAnalyser.fftSize = 256;
            playbackData = new Uint8Array(playbackAnalyser.frequencyBinCount);
            playbackSource = playbackContext.createMediaElementSource(item.audio);
            const workletUrl = createWorkletUrl();
            await playbackContext.audioWorklet.addModule(workletUrl);
            URL.revokeObjectURL(workletUrl);

            playbackTapNode = new AudioWorkletNode(
              playbackContext,
              "voice-playback-tap-processor",
              {
                numberOfInputs: 1,
                numberOfOutputs: 1,
                channelCount: 1,
                outputChannelCount: [1]
              }
            );
            playbackReferenceEmitter = createRealtimePcmEmitter(
              "playback-pcm-frame",
              playbackContext.sampleRate
            );
            playbackTapNode.port.onmessage = (event) => {
              playbackReferenceEmitter?.push(event.data);
            };

            playbackSource.connect(playbackTapNode);
            playbackTapNode.connect(playbackAnalyser);
            playbackAnalyser.connect(playbackContext.destination);

            if (playbackContext.state === "suspended") {
              await playbackContext.resume().catch(() => undefined);
            }

            const tick = () => {
              if (!activePlayback || !playbackAnalyser || !playbackData) {
                playbackRaf = 0;
                return;
              }

              playbackAnalyser.getByteTimeDomainData(playbackData);
              let energy = 0;
              for (let index = 0; index < playbackData.length; index += 1) {
                const normalized = (playbackData[index] - 128) / 128;
                energy += normalized * normalized;
              }
              const rms = Math.sqrt(energy / playbackData.length);
              emit({
                type: "speech-level",
                level: rms * 8,
                queueLength: playbackQueue.length,
                currentText: activePlayback.text
              });

              playbackRaf = requestAnimationFrame(tick);
            };

            playbackRaf = requestAnimationFrame(tick);
          } catch {}
        };

        const playNext = async () => {
          if (activePlayback || playbackQueue.length === 0) {
            return;
          }

          const item = playbackQueue.shift();
          if (!item) {
            return;
          }

          const audio = new Audio(`data:${item.mimeType || "audio/mpeg"};base64,${item.audioBase64}`);
          activePlayback = {
            id: item.id,
            text: item.text,
            audio
          };

          audio.onplay = () => {
            emit({
              type: "playback-started",
              id: item.id,
              text: item.text,
              queueLength: playbackQueue.length
            });
          };

          audio.onended = async () => {
            if (!activePlayback || activePlayback.id !== item.id) {
              return;
            }

            activePlayback = null;
            await clearPlaybackMonitor();
            emit({
              type: "playback-ended",
              id: item.id,
              text: item.text,
              queueLength: playbackQueue.length
            });
            void playNext();
          };

          audio.onerror = async () => {
            emit({
              type: "playback-error",
              id: item.id,
              message: "语音播放失败"
            });
            activePlayback = null;
            await clearPlaybackMonitor();
            void playNext();
          };

          try {
            await startPlaybackMonitor(activePlayback);
            await audio.play();
          } catch (error) {
            emit({
              type: "playback-error",
              id: item.id,
              message: error && error.message ? String(error.message) : "语音播放失败"
            });
            activePlayback = null;
            await clearPlaybackMonitor();
            void playNext();
          }
        };

        const createWorkletUrl = () => {
          const source = `
            class VoiceCaptureProcessor extends AudioWorkletProcessor {
              process(inputs) {
                const channel = inputs?.[0]?.[0];
                if (channel && channel.length > 0) {
                  this.port.postMessage(channel.slice(0));
                }
                return true;
              }
            }

            class VoicePlaybackTapProcessor extends AudioWorkletProcessor {
              process(inputs, outputs) {
                const channel = inputs?.[0]?.[0];
                const output = outputs?.[0]?.[0];
                if (channel && channel.length > 0) {
                  if (output && output.length === channel.length) {
                    output.set(channel);
                  }
                  this.port.postMessage(channel.slice(0));
                  return true;
                }

                if (output) {
                  output.fill(0);
                }
                return true;
              }
            }

            registerProcessor("voice-capture-processor", VoiceCaptureProcessor);
            registerProcessor("voice-playback-tap-processor", VoicePlaybackTapProcessor);
          `;
          return URL.createObjectURL(new Blob([source], { type: "text/javascript" }));
        };

        const startCapture = async (aecEnabled) => {
          if (captureStream) {
            emit({ type: "capture-started" });
            return;
          }

          try {
            captureStream = await navigator.mediaDevices.getUserMedia({
              audio: {
                channelCount: 1,
                echoCancellation: aecEnabled !== false,
                noiseSuppression: true,
                autoGainControl: true
              }
            });

            captureContext = new AudioContext({ sampleRate: 16000 });
            if (captureContext.state === "suspended") {
              await captureContext.resume();
            }

            const workletUrl = createWorkletUrl();
            await captureContext.audioWorklet.addModule(workletUrl);
            URL.revokeObjectURL(workletUrl);

            captureSource = captureContext.createMediaStreamSource(captureStream);
            captureNode = new AudioWorkletNode(captureContext, "voice-capture-processor", {
              numberOfInputs: 1,
              numberOfOutputs: 0,
              channelCount: 1
            });
            captureNode.port.onmessage = (event) => {
              const floatChunk = event.data;
              if (!floatChunk) {
                return;
              }

              const pcm16 = floatToInt16(floatChunk);
              emit(
                {
                  type: "pcm-frame",
                  pcm: Array.from(new Uint8Array(pcm16.buffer)),
                  sampleRate: 16000
                }
              );
            };

            captureSource.connect(captureNode);
            emit({ type: "capture-started" });
          } catch (error) {
            emit({
              type: "capture-error",
              message: error && error.message ? String(error.message) : "无法启动麦克风"
            });
          }
        };

        const stopCapture = async () => {
          if (captureNode) {
            try {
              captureNode.port.onmessage = null;
              captureNode.disconnect();
            } catch {}
          }

          if (captureSource) {
            try {
              captureSource.disconnect();
            } catch {}
          }

          if (captureStream) {
            for (const track of captureStream.getTracks()) {
              track.stop();
            }
          }

          if (captureContext) {
            try {
              await captureContext.close();
            } catch {}
          }

          captureNode = null;
          captureSource = null;
          captureStream = null;
          captureContext = null;
          emit({ type: "capture-stopped" });
        };

        const clearPlayback = async () => {
          playbackQueue = [];
          await stopActivePlayback();
          emit({
            type: "playback-cleared",
            queueLength: 0
          });
        };

        const handleCommand = (message) => {
          if (!message || typeof message !== "object") {
            return;
          }

          if (message.type === "start-capture") {
            void startCapture(message.aecEnabled);
            return;
          }

          if (message.type === "stop-capture") {
            void stopCapture();
            return;
          }

          if (message.type === "enqueue-playback") {
            playbackQueue.push({
              id: String(message.id || ""),
              audioBase64: typeof message.audioBase64 === "string" ? message.audioBase64 : "",
              text: typeof message.text === "string" ? message.text : "",
              mimeType: typeof message.mimeType === "string" ? message.mimeType : "audio/mpeg"
            });
            void playNext();
            return;
          }

          if (message.type === "clear-playback") {
            void clearPlayback();
          }
        };

        voiceHost.onCommand((payload) => {
          console.info("voice-host:command-received", payload && payload.type ? payload.type : "unknown");
          handleCommand(payload);
        });

        queueMicrotask(() => {
          console.info("voice-host:ipc-ready");
          emit({ type: "host-ready" });
        });
      })();
    </script>
  </body>
</html>
