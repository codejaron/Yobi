<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yobi Pet</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: "Helvetica Neue", "PingFang SC", sans-serif;
      }

      #root {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      #status {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%) translateY(-6px);
        max-width: calc(100% - 24px);
        border-radius: 999px;
        padding: 6px 12px;
        background: rgba(16, 18, 26, 0.84);
        border: 1px solid rgba(255, 255, 255, 0.16);
        color: rgba(255, 255, 255, 0.96);
        font-size: 12px;
        letter-spacing: 0.2px;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
        opacity: 0;
        pointer-events: none;
        transition: opacity 140ms ease, transform 140ms ease;
        z-index: 24;
      }

      #status.visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      #chat-panel {
        position: absolute;
        right: 12px;
        bottom: 12px;
        width: min(300px, calc(100% - 24px));
        border-radius: 14px;
        background: rgba(16, 18, 26, 0.86);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(8px);
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 12;
      }

      #chat-panel.hidden {
        display: none;
      }

      #chat-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: rgba(255, 255, 255, 0.82);
        font-size: 12px;
      }

      #chat-close {
        border: none;
        border-radius: 999px;
        width: 22px;
        height: 22px;
        background: rgba(255, 255, 255, 0.18);
        color: #fff;
        cursor: pointer;
      }

      #chat-log {
        max-height: 170px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .chat-msg {
        border-radius: 10px;
        padding: 6px 8px;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .chat-msg.user {
        align-self: flex-end;
        background: rgba(80, 171, 255, 0.9);
        color: #fff;
      }

      .chat-msg.assistant {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.92);
        color: #1f2430;
      }

      .chat-msg.pending {
        opacity: 0.76;
      }

      #chat-form {
        display: flex;
        gap: 6px;
      }

      #chat-input {
        flex: 1;
        min-width: 0;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: rgba(255, 255, 255, 0.95);
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 13px;
        outline: none;
      }

      #chat-send {
        border: none;
        border-radius: 10px;
        padding: 0 11px;
        background: #4f8cff;
        color: #fff;
        font-size: 12px;
        cursor: pointer;
      }

      #chat-send:disabled,
      #chat-input:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      #fallback {
        width: 220px;
        height: 220px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        inset: 50% auto auto 50%;
        transform: translate(-50%, -50%);
        background: transparent;
        color: #2f2014;
        font-weight: 700;
        z-index: 30;
        pointer-events: none;
        text-align: center;
      }

      .badge {
        border-radius: 999px;
        padding: 8px 14px;
        background: rgba(242, 176, 106, 0.85);
        box-shadow: 0 16px 42px rgba(0, 0, 0, 0.25);
      }

      .pulse {
        animation: pulse 0.45s ease-in-out 3;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.04);
        }
        100% {
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="fallback"></div>
      <div id="status">idle</div>
      <div id="chat-panel" class="hidden">
        <div id="chat-topbar">
          <span>和 Yobi 聊天</span>
          <button id="chat-close" type="button">×</button>
        </div>
        <div id="chat-log"></div>
        <form id="chat-form">
          <input id="chat-input" type="text" maxlength="500" placeholder="点这里和我聊天..." />
          <button id="chat-send" type="submit">发送</button>
        </form>
      </div>
    </div>

    <script src="./pet-emotion-runtime.js"></script>
    <script>
      const petBridge = window.petApi;

      const statusEl = document.getElementById("status");
      const fallbackEl = document.getElementById("fallback");
      const rootEl = document.getElementById("root");
      const chatPanelEl = document.getElementById("chat-panel");
      const chatLogEl = document.getElementById("chat-log");
      const chatFormEl = document.getElementById("chat-form");
      const chatInputEl = document.getElementById("chat-input");
      const chatSendEl = document.getElementById("chat-send");
      const chatCloseEl = document.getElementById("chat-close");

      const params = new URLSearchParams(window.location.search);
      const presetModelJsonUrl = params.get("modelJsonUrl") || "";
      const presetFallbackImageUrl = params.get("fallbackImageUrl") || "";
      const cubismCoreUrl = params.get("cubismCoreUrl") || "";
      const pixiScriptUrl = params.get("pixiScriptUrl") || "";
      const pixiSoundScriptUrl = params.get("pixiSoundScriptUrl") || "";
      const live2dScriptUrl = params.get("live2dScriptUrl") || "";
      const emotionConfigBase64 = params.get("emotionConfigBase64") || "";
      const emotionRuntimeModule = window.YobiPetEmotionRuntime || null;
      const emotionConfig =
        emotionRuntimeModule && typeof emotionRuntimeModule.decodeConfigBase64 === "function"
          ? emotionRuntimeModule.decodeConfigBase64(emotionConfigBase64)
          : null;
      const PET_SCALE_STORAGE_KEY = "yobi.pet.scale.v1";
      const STATUS_TEXT = {
        idle: "",
        thinking: "思考中...",
        talking: "正在说话...",
        "ptt-recording": "正在录音，松开快捷键发送",
        "ptt-transcribing": "识别中...",
        "ptt-empty": "录音太短，请重试",
        "ptt-sent": "已发送",
        "ptt-cancel": "已取消录音",
        "ptt-mic-error": "麦克风不可用",
        "ptt-failed": "语音处理失败",
        "speech-error": "语音播放失败",
        "speech-blocked": "浏览器阻止自动播放"
      };
      const MODEL_LOAD_TIMEOUT_MS = 12000;
      const BOOT_TIMEOUT_MS = 8000;

      const debugLog = (message, detail) => {
        try {
          petBridge.debugLog(String(message || ""), detail);
        } catch {}
      };

      window.addEventListener("error", (event) => {
        debugLog("window-error", { message: event.message, filename: event.filename, lineno: event.lineno });
      });
      window.addEventListener("unhandledrejection", (event) => {
        debugLog("unhandledrejection", String(event.reason || ""));
      });

      const updateStatus = (text) => {
        const raw = typeof text === "string" ? text.trim() : "";
        const label = STATUS_TEXT[raw] ?? raw;
        if (!statusEl) {
          return;
        }

        statusEl.textContent = label;
        statusEl.classList.toggle("visible", label.length > 0);
      };

      const isElement = (value) => value && typeof value === "object" && "closest" in value;

      const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

      const readScalePreference = () => {
        try {
          const raw = localStorage.getItem(PET_SCALE_STORAGE_KEY);
          if (!raw) {
            return 1;
          }

          const parsed = Number(raw);
          if (!Number.isFinite(parsed)) {
            return 1;
          }

          return clamp(parsed, 0.65, 1.85);
        } catch {
          return 1;
        }
      };

      const saveScalePreference = (value) => {
        try {
          localStorage.setItem(PET_SCALE_STORAGE_KEY, String(clamp(value, 0.65, 1.85)));
        } catch {}
      };

      const normalizeHitAreas = (areas) => {
        if (!Array.isArray(areas)) {
          return [];
        }

        return areas
          .filter((value) => typeof value === "string")
          .map((value) => value.trim());
      };

      const normalizeMotionDefinitions = (input) => {
        if (!input || typeof input !== "object") {
          return {};
        }

        const entries = input instanceof Map ? Array.from(input.entries()) : Object.entries(input);
        const normalized = {};

        for (const [group, bucket] of entries) {
          const key = typeof group === "string" ? group : String(group || "");
          normalized[key] = Array.isArray(bucket) ? bucket : [];
        }

        return normalized;
      };

      const readMotionDefinitionsFromModelJson = (modelJsonPath) => {
        return {};
      };

      const readHitAreaNamesFromModelJson = (modelJsonPath) => {
        return [];
      };

      const listDirectoryEntries = (baseDir) => {
        try {
          return petBridge.walkFiles(baseDir);
        } catch {
          return [];
        }
      };

      const buildCandidateDirs = (baseDir) => {
        const candidates = [baseDir, petBridge.joinPath(baseDir, "runtime")];
        const directChildren = listDirectoryEntries(baseDir)
          .filter((file) => file.startsWith(`${baseDir}${baseDir.endsWith("/") ? "" : "/"}`))
          .map((file) => {
            const relative = file.slice(baseDir.length).replace(/^[/\\]+/, "");
            const first = relative.split(/[/\\]/)[0];
            return first ? petBridge.joinPath(baseDir, first) : "";
          })
          .filter(Boolean);

        for (const childDir of new Set(directChildren)) {
          candidates.push(childDir);
          candidates.push(petBridge.joinPath(childDir, "runtime"));
        }

        return Array.from(new Set(candidates));
      };

      const pickFile = (patternFn) => {
        const candidateDirs = buildCandidateDirs(modelDir);
        for (const dir of candidateDirs) {
          const files = listDirectoryEntries(dir);
          const matched = files.find(patternFn);
          if (matched) {
            return matched;
          }
        }
        return null;
      };

      const resolveFallbackImage = () => {
        if (presetFallbackImageUrl) {
          return presetFallbackImageUrl;
        }
        return null;
      };

      const nextPaint = () =>
        new Promise((resolve) => {
          requestAnimationFrame(() => resolve());
        });

      const withTimeout = (promise, timeoutMs, label) =>
        new Promise((resolve, reject) => {
          const timer = window.setTimeout(() => {
            reject(new Error(label));
          }, timeoutMs);

          Promise.resolve(promise)
            .then((value) => resolve(value))
            .catch((error) => reject(error))
            .finally(() => {
              window.clearTimeout(timer);
            });
        });

      const showFallback = (reason, imagePath) => {
        fallbackEl.style.display = "flex";
        fallbackEl.innerHTML = imagePath
          ? `<div style="display:flex;flex-direction:column;align-items:center;gap:10px;"><img src="${toFileHref(
              imagePath
            )}" style="max-width:220px;max-height:220px;object-fit:contain;filter:drop-shadow(0 12px 32px rgba(0,0,0,0.22));" alt="Yobi fallback" /><div class="badge">Yobi</div><div style="font-size:12px;opacity:.8;max-width:220px;">${reason}</div></div>`
          : `<div style="display:flex;flex-direction:column;align-items:center;gap:10px;"><div class="badge">Yobi</div><div style="font-size:12px;opacity:.8;max-width:220px;">${reason}</div></div>`;
        updateStatus(`fallback · ${reason}`);
      };

      const loadScript = (src) =>
        new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.onload = () => resolve();
          script.onerror = () => reject(new Error(`Failed to load ${src}`));
          document.head.appendChild(script);
        });

      const toFileHref = (value) => value || "";

      const mergeFloatChunks = (chunks) => {
        if (!Array.isArray(chunks) || chunks.length === 0) {
          return new Float32Array(0);
        }

        let totalLength = 0;
        for (const chunk of chunks) {
          totalLength += chunk.length;
        }

        const merged = new Float32Array(totalLength);
        let offset = 0;
        for (const chunk of chunks) {
          merged.set(chunk, offset);
          offset += chunk.length;
        }

        return merged;
      };

      const downsampleToRate = (input, inputRate, outputRate) => {
        if (!input || input.length === 0 || inputRate === outputRate) {
          return input || new Float32Array(0);
        }

        const ratio = inputRate / outputRate;
        const outputLength = Math.max(1, Math.floor(input.length / ratio));
        const output = new Float32Array(outputLength);
        let inputOffset = 0;

        for (let index = 0; index < outputLength; index += 1) {
          const nextOffset = Math.min(input.length, Math.floor((index + 1) * ratio));
          let total = 0;
          let count = 0;

          for (let offset = inputOffset; offset < nextOffset; offset += 1) {
            total += input[offset];
            count += 1;
          }

          output[index] = count > 0 ? total / count : 0;
          inputOffset = nextOffset;
        }

        return output;
      };

      const floatToInt16 = (input) => {
        const output = new Int16Array(input.length);
        for (let index = 0; index < input.length; index += 1) {
          const value = Math.max(-1, Math.min(1, input[index] || 0));
          output[index] = value < 0 ? Math.round(value * 0x8000) : Math.round(value * 0x7fff);
        }
        return output;
      };

      const uint8ToBase64 = (bytes) => {
        if (!bytes || bytes.length === 0) {
          return "";
        }

        const chunkSize = 0x8000;
        let binary = "";
        for (let offset = 0; offset < bytes.length; offset += chunkSize) {
          const slice = bytes.subarray(offset, offset + chunkSize);
          binary += String.fromCharCode(...slice);
        }
        return btoa(binary);
      };

      const isNativeCaptureUnsupported = (error) => {
        const message =
          error && typeof error === "object" && "message" in error ? String(error.message) : String(error ?? "");
        return /unsupported|不支持/i.test(message);
      };

      const createBrowserPcm16Recorder = () => {
        let stream = null;
        let audioContext = null;
        let sourceNode = null;
        let processorNode = null;
        let chunks = [];
        let inputRate = 44100;
        let startedAt = 0;

        const teardown = async (preserveChunks) => {
          const snapshotChunks = preserveChunks ? chunks.slice() : [];
          const elapsedMs = startedAt > 0 ? Date.now() - startedAt : 0;
          const sampleRate = inputRate;

          if (processorNode) {
            processorNode.onaudioprocess = null;
            try {
              processorNode.disconnect();
            } catch {}
          }

          if (sourceNode) {
            try {
              sourceNode.disconnect();
            } catch {}
          }

          if (stream) {
            const tracks = stream.getTracks();
            for (const track of tracks) {
              track.stop();
            }
          }

          if (audioContext) {
            try {
              await audioContext.close();
            } catch {}
          }

          stream = null;
          audioContext = null;
          sourceNode = null;
          processorNode = null;
          chunks = [];
          startedAt = 0;

          return {
            chunks: snapshotChunks,
            elapsedMs,
            sampleRate
          };
        };

        return {
          isRecording() {
            return Boolean(stream);
          },
          async start() {
            if (stream) {
              return;
            }

            stream = await navigator.mediaDevices.getUserMedia({
              audio: {
                channelCount: 1,
                noiseSuppression: true,
                echoCancellation: true,
                autoGainControl: true
              }
            });

            audioContext = new AudioContext();
            if (audioContext.state === "suspended") {
              await audioContext.resume();
            }

            sourceNode = audioContext.createMediaStreamSource(stream);
            processorNode = audioContext.createScriptProcessor(4096, 1, 1);
            chunks = [];
            inputRate = audioContext.sampleRate;
            startedAt = Date.now();

            processorNode.onaudioprocess = (event) => {
              const channel = event.inputBuffer.getChannelData(0);
              chunks.push(new Float32Array(channel));
            };

            sourceNode.connect(processorNode);
            processorNode.connect(audioContext.destination);
          },
          async stop(outputRate = 16000) {
            const snapshot = await teardown(true);
            const merged = mergeFloatChunks(snapshot.chunks);
            const downsampled = downsampleToRate(merged, snapshot.sampleRate, outputRate);
            const pcm16 = floatToInt16(downsampled);
            const pcm16Base64 = uint8ToBase64(new Uint8Array(pcm16.buffer));
            const durationMs =
              pcm16.length > 0
                ? Math.round((pcm16.length / outputRate) * 1000)
                : Math.max(0, snapshot.elapsedMs);

            return {
              pcm16Base64,
              sampleRate: outputRate,
              durationMs
            };
          },
          async cancel() {
            await teardown(false);
          }
        };
      };

      const createPcm16Recorder = () => {
        const browserRecorder = createBrowserPcm16Recorder();
        let backend = null;
        let nativeRecording = false;
        let startPromise = null;
        let pendingBackend = null;

        if (petBridge && typeof petBridge.warmupSegmentCapture === "function") {
          Promise.resolve(petBridge.warmupSegmentCapture()).catch(() => undefined);
        }

        return {
          isRecording() {
            if (pendingBackend === "native") {
              return true;
            }

            if (pendingBackend === "browser") {
              return true;
            }

            if (backend === "native") {
              return nativeRecording;
            }

            return browserRecorder.isRecording();
          },
          async start() {
            if (backend) {
              return;
            }

            if (startPromise) {
              return startPromise;
            }

            startPromise = (async () => {
              if (
                petBridge &&
                typeof petBridge.startSegmentCapture === "function" &&
                typeof petBridge.stopSegmentCapture === "function"
              ) {
                try {
                  pendingBackend = "native";
                  await petBridge.startSegmentCapture();
                  backend = "native";
                  nativeRecording = true;
                  return;
                } catch (error) {
                  if (!isNativeCaptureUnsupported(error)) {
                    throw error;
                  }
                }
              }

              pendingBackend = "browser";
              await browserRecorder.start();
              backend = "browser";
            })().finally(() => {
              startPromise = null;
              pendingBackend = null;
            });

            return startPromise;
          },
          async stop(outputRate = 16000) {
            if (startPromise) {
              await startPromise.catch(() => undefined);
            }

            const activeBackend = backend;
            backend = null;
            if (activeBackend === "native") {
              nativeRecording = false;
              return petBridge.stopSegmentCapture();
            }

            if (!activeBackend) {
              return {
                pcm16Base64: "",
                sampleRate: outputRate,
                durationMs: 0
              };
            }

            return browserRecorder.stop(outputRate);
          },
          async cancel() {
            if (startPromise) {
              await startPromise.catch(() => undefined);
            }

            const activeBackend = backend;
            backend = null;
            if (activeBackend === "native") {
              nativeRecording = false;
              if (petBridge && typeof petBridge.cancelSegmentCapture === "function") {
                await petBridge.cancelSegmentCapture();
              }
              return;
            }

            await browserRecorder.cancel();
          }
        };
      };

      const loadCubismCore = async () => {
        if (!cubismCoreUrl) {
          return { ok: false };
        }

        try {
          await loadScript(cubismCoreUrl);
          if (window.Live2DCubismCore) {
            return { ok: true, source: cubismCoreUrl };
          }
        } catch {}

        return { ok: false };
      };

      const loadRuntime = async () => {
        try {
          const coreState = await loadCubismCore();
          if (!coreState.ok) {
            return {
              error: "missing-cubism-core"
            };
          }

          if (!pixiScriptUrl) {
            return {
              error: "missing-pixi-script"
            };
          }
          if (!pixiSoundScriptUrl) {
            return {
              error: "missing-pixi-sound-script"
            };
          }
          if (!live2dScriptUrl) {
            return {
              error: "missing-live2d-script"
            };
          }

          await loadScript(pixiScriptUrl);
          await loadScript(pixiSoundScriptUrl);
          await loadScript(live2dScriptUrl);

          const PIXI = window.PIXI;
          const Live2DModel = window.PIXI?.live2d?.Live2DModel || null;
          const live2dModule = window.PIXI?.live2d || null;

          if (!PIXI || !Live2DModel) {
            return {
              error: "runtime-not-ready"
            };
          }

          return { PIXI, Live2DModel, live2dModule };
        } catch (error) {
          return {
            error: error && error.message ? String(error.message) : "script-load-failed"
          };
        }
      };

      const resolveLive2DSoundConfigs = (live2dModule) => {
        const candidates = [
          live2dModule?.config,
          live2dModule?.default?.config,
          live2dModule?.live2d?.config,
          window.PIXI?.live2d?.config
        ];

        const configs = [];
        for (const config of candidates) {
          if (!config || typeof config !== "object" || configs.includes(config)) {
            continue;
          }

          configs.push(config);
        }

        return configs;
      };

      const setLive2DSoundEnabled = (configs, enabled) => {
        for (const config of configs) {
          try {
            config.sound = enabled;
          } catch {}
        }
      };

      async function boot() {
        try {
          fallbackEl.innerHTML = `<div class="badge">Yobi 加载中</div>`;
          debugLog("boot:start", {
            presetModelJsonUrl,
            presetFallbackImageUrl,
            cubismCoreUrl,
            pixiScriptUrl,
            pixiSoundScriptUrl,
            live2dScriptUrl
          });
          updateStatus("初始化桌宠...");
          const modelJsonPath = presetModelJsonUrl || "";
          if (!modelJsonPath) {
            debugLog("boot:missing-model3-path");
            showFallback("missing-model3-path-from-main", presetFallbackImageUrl || null);
            return;
          }

          let bootSettled = false;
          const settleBootFailure = (reason) => {
            if (bootSettled) {
              return false;
            }
            bootSettled = true;
            showFallback(reason, resolveFallbackImage());
            return true;
          };
          const bootTimer = window.setTimeout(() => {
            settleBootFailure("boot-timeout");
          }, BOOT_TIMEOUT_MS);

          updateStatus("加载运行时...");
          debugLog("boot:load-runtime");
          await nextPaint();
          const runtime = await loadRuntime();
          debugLog("boot:runtime-result", runtime);
          if (!runtime || !runtime.PIXI || !runtime.Live2DModel) {
            const reason = runtime && runtime.error ? runtime.error : "missing-deps";
            window.clearTimeout(bootTimer);
            settleBootFailure(`missing-deps:${reason}`);
            return;
          }
          const { PIXI, Live2DModel, live2dModule } = runtime;
          const live2dSoundConfigs = resolveLive2DSoundConfigs(live2dModule);
          setLive2DSoundEnabled(live2dSoundConfigs, false);

          const app = new PIXI.Application({
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundAlpha: 0,
            autoStart: true,
            antialias: true
          });
          app.stage.eventMode = "static";
          const stageHitArea = new PIXI.Rectangle(0, 0, app.renderer.width, app.renderer.height);
          app.stage.hitArea = stageHitArea;

          updateStatus("加载模型...");
          debugLog("boot:load-model", { modelJsonPath });
          await nextPaint();
          const model = await withTimeout(
            Live2DModel.from(toFileHref(modelJsonPath), {
              autoInteract: false,
              autoUpdate: false
            }),
            MODEL_LOAD_TIMEOUT_MS,
            "model-load-timeout"
          );
          model.eventMode = "static";
          model.autoUpdate = false;
          bootSettled = true;
          window.clearTimeout(bootTimer);
          debugLog("boot:model-loaded");
          fallbackEl.style.display = "none";
          updateStatus("idle");

          const runtimeMotionDefinitions = normalizeMotionDefinitions(
            model?.internalModel?.motionManager?.definitions
          );
          const modelJsonMotionDefinitions = readMotionDefinitionsFromModelJson(modelJsonPath);
          const namedHitAreasFromModelJson = readHitAreaNamesFromModelJson(modelJsonPath);
          const hasNamedHitAreas = namedHitAreasFromModelJson.length > 0;
          const motionDefinitions = {
            ...runtimeMotionDefinitions,
            ...modelJsonMotionDefinitions
          };
          const motionGroupNames = Object.keys(motionDefinitions).filter(
            (name) => Array.isArray(motionDefinitions[name]) && motionDefinitions[name].length > 0
          );
          const normalizedMotionGroupNames = motionGroupNames.map((name) => ({
            name,
            normalized: name.trim().toLowerCase()
          }));

          const findMotionGroup = (candidates, options = {}) => {
            const allowAny = options.allowAny === true;
            const includeEmpty = options.includeEmpty === true;

            for (const candidate of candidates) {
              const normalizedCandidate = candidate.trim().toLowerCase();
              if (!normalizedCandidate) {
                continue;
              }

              const exact = normalizedMotionGroupNames.find(
                (entry) => entry.normalized === normalizedCandidate
              );
              if (exact) {
                return exact.name;
              }
            }

            for (const candidate of candidates) {
              const normalizedCandidate = candidate.trim().toLowerCase();
              if (!normalizedCandidate) {
                continue;
              }

              const fuzzy = normalizedMotionGroupNames.find((entry) =>
                entry.normalized.includes(normalizedCandidate)
              );
              if (fuzzy) {
                return fuzzy.name;
              }
            }

            if (!allowAny) {
              return null;
            }

            const nonEmptyFallback = normalizedMotionGroupNames.find((entry) => entry.normalized.length > 0);
            if (nonEmptyFallback) {
              return nonEmptyFallback.name;
            }

            if (includeEmpty && motionGroupNames.length > 0) {
              return motionGroupNames[0];
            }

            return null;
          };

          const motionBinding = {
            idle: findMotionGroup(["idle"], {
              allowAny: true,
              includeEmpty: true
            }),
            thinking: findMotionGroup(["idle", "think", "thinking"], {
              allowAny: true,
              includeEmpty: true
            }),
            talking: findMotionGroup(["tap", "talk", "speak", "voice"], {
              allowAny: true,
              includeEmpty: true
            }),
            tapHead: findMotionGroup(["flick", "head", "taphead", "touchhead"], {
              allowAny: true,
              includeEmpty: true
            }),
            tapBody: findMotionGroup(["tap", "body", "tapbody", "touchbody"], {
              allowAny: true,
              includeEmpty: true
            }),
            happy: findMotionGroup(["flickright", "happy", "smile"], {
              allowAny: true,
              includeEmpty: true
            }),
            sad: findMotionGroup(["idle", "sad", "down"], {
              allowAny: true,
              includeEmpty: true
            }),
            angry: findMotionGroup(["shake", "angry", "mad"], {
              allowAny: true,
              includeEmpty: true
            }),
            surprised: findMotionGroup(["flick", "surprised", "surprise"], {
              allowAny: true,
              includeEmpty: true
            }),
            shy: findMotionGroup(["idle", "shy", "blush"], {
              allowAny: true,
              includeEmpty: true
            }),
            excited: findMotionGroup(["flick3", "excited", "flickright"], {
              allowAny: true,
              includeEmpty: true
            })
          };
          const firstDefinedMotionGroup = (...groups) => {
            for (const group of groups) {
              if (typeof group === "string") {
                return group;
              }
            }
            return null;
          };
          const idleMotionGroup = firstDefinedMotionGroup(
            motionBinding.idle,
            motionBinding.talking,
            motionGroupNames[0]
          );
          const thinkingMotionGroup = firstDefinedMotionGroup(motionBinding.thinking, idleMotionGroup);
          const talkingMotionGroup = firstDefinedMotionGroup(
            motionBinding.talking,
            motionBinding.tapBody,
            idleMotionGroup
          );

          let baseScale = 0.11;
          let zoomScale = readScalePreference();
          let statusResetTimer = null;
          let idleMotionTimer = null;
          let suppressTapUntil = 0;
          let thinkingActive = false;
          let localSpeechActive = false;
          let speechActive = false;
          let remoteSpeechActive = false;
          let localSpeechToken = 0;
          let talkingMotionManager = null;
          let emotionMotionManager = null;
          let talkingMotionIndex = null;
          let talkingMotionHeld = false;
          let talkingMotionUsesPrimary = false;
          let selectedExpressionId = "";
          let transientExpressionToken = 0;
          let transientExpressionTimer = null;
          let syntheticLipSyncRaf = 0;
          let chatRequestToken = 0;
          let pendingSingleTapTimer = null;
          let pendingSingleTapArea = null;
          let lastTapAt = 0;
          let mousePassthrough = false;
          let hasPointerSample = false;
          let lastPointerClientX = 0;
          let lastPointerClientY = 0;
          let cursorPollTimer = 0;
          let cursorPollInFlight = false;
          let pttProcessing = false;
          let emotionRenderer = null;
          const pttRecorder = createPcm16Recorder();

          const MOUTH_PARAMETER_ID = "PARAM_MOUTH_OPEN_Y";
          const MOTION_PRIORITY_FORCE = 3;
          const SINGLE_TAP_DELAY_MS = 340;
          const DOUBLE_TAP_GAP_MS = 320;
          const DRAG_ACTIVATE_DISTANCE = 8;
          const CURSOR_POLL_INTERVAL_MS = 48;

          try {
            model.internalModel?.extendParallelMotionManager?.(2);
            talkingMotionManager = model.internalModel?.parallelMotionManager?.[0] || null;
            emotionMotionManager = model.internalModel?.parallelMotionManager?.[1] || null;
            talkingMotionManager?.on?.("motionFinish", () => {
              if (syncSpeechActive()) {
                void holdTalkingMotionLastFrame();
                return;
              }
              stopTalkingMotion();
            });
          } catch {}

          const setChatVisible = (visible) => {
            if (!chatPanelEl) {
              return;
            }

            if (visible) {
              chatPanelEl.classList.remove("hidden");
            } else {
              chatPanelEl.classList.add("hidden");
            }
          };

          const setMousePassthrough = (ignore) => {
            if (mousePassthrough === ignore) {
              return;
            }
            mousePassthrough = ignore;
            petBridge.setIgnoreMouseEvents({
              ignore,
              forward: true
            });
          };

          const isChatVisible = () => Boolean(chatPanelEl && !chatPanelEl.classList.contains("hidden"));

          const focusChatInput = () => {
            if (!chatInputEl) {
              return;
            }

            chatInputEl.focus();
          };

          const appendChatMessage = (role, text, options = {}) => {
            if (!chatLogEl) {
              return null;
            }

            const messageEl = document.createElement("div");
            messageEl.className = `chat-msg ${role}${options.pending ? " pending" : ""}`;
            messageEl.textContent = text;
            chatLogEl.appendChild(messageEl);

            while (chatLogEl.children.length > 16) {
              chatLogEl.removeChild(chatLogEl.firstChild);
            }

            chatLogEl.scrollTop = chatLogEl.scrollHeight;
            return messageEl;
          };

          const setChatSubmitting = (submitting) => {
            if (chatInputEl) {
              chatInputEl.disabled = submitting;
            }
            if (chatSendEl) {
              chatSendEl.disabled = submitting;
            }
          };

          const resetChatSession = () => {
            chatRequestToken += 1;
            setChatSubmitting(false);
            if (chatInputEl) {
              chatInputEl.value = "";
            }
            if (chatLogEl) {
              chatLogEl.replaceChildren();
            }
          };

          const closeChatPanel = () => {
            setChatVisible(false);
            resetChatSession();
            if (hasPointerSample) {
              syncPointerHitMode(lastPointerClientX, lastPointerClientY);
            }
          };

          const startPushToTalkCapture = async () => {
            if (pttProcessing || pttRecorder.isRecording()) {
              return;
            }

            try {
              await pttRecorder.start();
              updateStatus("ptt-recording");
            } catch (error) {
              const message =
                error && typeof error === "object" && "message" in error
                  ? String(error.message)
                  : "ptt-mic-error";
              updateStatus(message);
              scheduleStatusBackToBaseline(1400);
            }
          };

          const stopPushToTalkCapture = async () => {
            if (pttProcessing || !pttRecorder.isRecording()) {
              return;
            }

            pttProcessing = true;
            updateStatus("ptt-transcribing");
            clearStatusTimer();

            try {
              const recorded = await pttRecorder.stop(16000);
              if (!recorded.pcm16Base64 || recorded.durationMs < 280) {
                updateStatus("ptt-empty");
                scheduleStatusBackToBaseline(900);
                return;
              }

              const result = await petBridge.transcribeAndSendFromPet({
                pcm16Base64: recorded.pcm16Base64,
                sampleRate: recorded.sampleRate
              });

              const sent = Boolean(result && typeof result === "object" && result.sent === true);
              if (!sent) {
                const message =
                  result &&
                  typeof result === "object" &&
                  typeof result.message === "string" &&
                  result.message.trim()
                    ? result.message.trim()
                    : "未识别到有效语音";
                updateStatus(message);
                scheduleStatusBackToBaseline(1000);
                return;
              }

              const transcribedText =
                result &&
                typeof result === "object" &&
                typeof result.text === "string" &&
                result.text.trim()
                  ? result.text.trim()
                  : "";
              const replyText =
                result &&
                typeof result === "object" &&
                typeof result.replyText === "string" &&
                result.replyText.trim()
                  ? result.replyText.trim()
                  : "";

              if (isChatVisible()) {
                if (transcribedText) {
                  appendChatMessage("user", transcribedText);
                }
                if (replyText) {
                  appendChatMessage("assistant", replyText);
                }
              }

              updateStatus("ptt-sent");
              scheduleStatusBackToBaseline(900);
            } catch (error) {
              const message =
                error && typeof error === "object" && "message" in error
                  ? String(error.message)
                  : "ptt-failed";
              updateStatus(message);
              scheduleStatusBackToBaseline(1200);
            } finally {
              pttProcessing = false;
            }
          };

          const cancelPushToTalkCapture = async (reason) => {
            const wasRecording = pttRecorder.isRecording();
            const wasProcessing = pttProcessing;
            if (wasRecording) {
              await pttRecorder.cancel();
            }

            pttProcessing = false;
            const normalizedReason = typeof reason === "string" ? reason.trim() : "";
            if (!wasRecording && !wasProcessing && !normalizedReason) {
              return;
            }

            if (normalizedReason) {
              updateStatus(normalizedReason);
              scheduleStatusBackToBaseline(1400);
              return;
            }

            updateStatus("ptt-cancel");
            scheduleStatusBackToBaseline(900);
          };

          const clearStatusTimer = () => {
            if (statusResetTimer) {
              clearTimeout(statusResetTimer);
              statusResetTimer = null;
            }
          };

          const clearIdleMotionLoop = () => {
            if (idleMotionTimer) {
              clearTimeout(idleMotionTimer);
              idleMotionTimer = null;
            }
          };

          const clearPendingSingleTap = () => {
            if (pendingSingleTapTimer) {
              clearTimeout(pendingSingleTapTimer);
              pendingSingleTapTimer = null;
            }
            pendingSingleTapArea = null;
          };

          const clearTransientExpressionRestore = () => {
            if (transientExpressionTimer) {
              clearTimeout(transientExpressionTimer);
              transientExpressionTimer = null;
            }
          };

          const motionCount = (group) => {
            if (typeof group !== "string") {
              return 0;
            }
            const bucket = motionDefinitions[group];
            return Array.isArray(bucket) ? bucket.length : 0;
          };

          const syncSpeechActive = () => {
            speechActive = localSpeechActive || remoteSpeechActive;
            return speechActive;
          };

          const resolveMotionIndex = (group, index) => {
            const count = motionCount(group);
            if (count <= 0) {
              return null;
            }

            return Number.isInteger(index) && index >= 0 && index < count
              ? index
              : Math.floor(Math.random() * count);
          };

          const playPrimaryMotion = async (group, index) => {
            if (typeof group !== "string") {
              return false;
            }
            const nextIndex = resolveMotionIndex(group, index);
            if (nextIndex === null) {
              return false;
            }

            try {
              return Boolean(await model.motion(group, nextIndex, MOTION_PRIORITY_FORCE));
            } catch {
              return false;
            }
          };

          const playPrimaryMotionLastFrame = async (group, index) => {
            if (typeof group !== "string" || typeof model.motionLastFrame !== "function") {
              return false;
            }
            const nextIndex = resolveMotionIndex(group, index);
            if (nextIndex === null) {
              return false;
            }

            try {
              return Boolean(await model.motionLastFrame(group, nextIndex));
            } catch {
              return false;
            }
          };

          const playManagedMotion = async (manager, group, index) => {
            if (!manager || typeof manager.startMotion !== "function" || typeof group !== "string") {
              return false;
            }
            const nextIndex = resolveMotionIndex(group, index);
            if (nextIndex === null) {
              return false;
            }

            try {
              return Boolean(await manager.startMotion(group, nextIndex, MOTION_PRIORITY_FORCE));
            } catch {
              return false;
            }
          };

          const playManagedMotionLastFrame = async (manager, group, index) => {
            if (!manager || typeof manager.playMotionLastFrame !== "function" || typeof group !== "string") {
              return false;
            }
            const nextIndex = resolveMotionIndex(group, index);
            if (nextIndex === null) {
              return false;
            }

            try {
              return Boolean(await manager.playMotionLastFrame(group, nextIndex));
            } catch {
              return false;
            }
          };

          const stopTalkingMotion = () => {
            if (talkingMotionManager && typeof talkingMotionManager.stopAllMotions === "function") {
              try {
                talkingMotionManager.stopAllMotions();
              } catch {}
            }

            if (talkingMotionUsesPrimary && typeof model.stopMotions === "function") {
              try {
                model.stopMotions();
              } catch {}
            }

            talkingMotionIndex = null;
            talkingMotionHeld = false;
            talkingMotionUsesPrimary = false;
          };

          const startPrimaryTalkingMotion = async (index) => {
            if (typeof talkingMotionGroup !== "string") {
              return false;
            }

            try {
              return Boolean(
                await model.motion(talkingMotionGroup, index, MOTION_PRIORITY_FORCE, {
                  onFinish: () => {
                    if (syncSpeechActive()) {
                      void holdTalkingMotionLastFrame();
                      return;
                    }
                    stopTalkingMotion();
                  }
                })
              );
            } catch {
              return false;
            }
          };

          const startTalkingMotion = async () => {
            if (!syncSpeechActive()) {
              stopTalkingMotion();
              return false;
            }

            if (talkingMotionIndex !== null) {
              return true;
            }

            const nextIndex = resolveMotionIndex(talkingMotionGroup);
            if (nextIndex === null) {
              return false;
            }

            talkingMotionIndex = nextIndex;
            talkingMotionHeld = false;
            talkingMotionUsesPrimary = false;

            if (talkingMotionManager) {
              const ok = await playManagedMotion(talkingMotionManager, talkingMotionGroup, nextIndex);
              if (ok) {
                return true;
              }
            }

            talkingMotionUsesPrimary = true;
            const ok = await startPrimaryTalkingMotion(nextIndex);
            if (!ok) {
              stopTalkingMotion();
            }
            return ok;
          };

          const holdTalkingMotionLastFrame = async () => {
            if (!syncSpeechActive()) {
              stopTalkingMotion();
              return false;
            }

            if (talkingMotionIndex === null || talkingMotionHeld) {
              return talkingMotionIndex !== null;
            }

            let ok = false;
            if (talkingMotionManager) {
              ok = await playManagedMotionLastFrame(talkingMotionManager, talkingMotionGroup, talkingMotionIndex);
            }

            if (!ok) {
              talkingMotionUsesPrimary = true;
              ok = await playPrimaryMotionLastFrame(talkingMotionGroup, talkingMotionIndex);
            }

            if (ok) {
              talkingMotionHeld = true;
            }

            return ok;
          };

          const ensureTalkingMotion = async () => {
            if (!syncSpeechActive()) {
              stopTalkingMotion();
              return false;
            }

            if (talkingMotionIndex !== null) {
              return true;
            }

            return startTalkingMotion();
          };

          const applyExpression = async (id) => {
            const normalizedId = typeof id === "string" ? id.trim() : "";
            if (!normalizedId) {
              try {
                model.internalModel?.motionManager?.expressionManager?.resetExpression?.();
                return true;
              } catch {
                return false;
              }
            }

            try {
              return Boolean(await model.expression(normalizedId));
            } catch {
              return false;
            }
          };

          const applySelectedExpression = async (id) => {
            selectedExpressionId = typeof id === "string" ? id.trim() : "";
            transientExpressionToken += 1;
            clearTransientExpressionRestore();
            return applyExpression(selectedExpressionId);
          };

          const scheduleExpressionRestore = (delayMs) => {
            const restoreDelay = Number.isFinite(delayMs) ? Math.max(0, delayMs) : 0;
            const token = ++transientExpressionToken;
            clearTransientExpressionRestore();
            transientExpressionTimer = setTimeout(() => {
              transientExpressionTimer = null;
              if (token !== transientExpressionToken) {
                return;
              }
              void applyExpression(selectedExpressionId);
            }, restoreDelay);
          };

          const setMouthOpen = (value) => {
            const clamped = clamp(value, 0, 1);
            if (emotionRenderer) {
              emotionRenderer.setLipSyncOpen(clamped);
              return;
            }
            try {
              model.internalModel?.coreModel?.setParameterValueById?.(MOUTH_PARAMETER_ID, clamped);
            } catch {}
          };

          const pulseModel = () => {
            rootEl.classList.add("pulse");
            setTimeout(() => rootEl.classList.remove("pulse"), 1600);
          };

          const sampleModelLipSyncOpen = () => {
            const motionManager = model.internalModel?.motionManager;
            if (!motionManager?.currentAudio || typeof motionManager.mouthSync !== "function") {
              return 0;
            }

            const sampled = Number(motionManager.mouthSync());
            if (!Number.isFinite(sampled) || sampled <= 0) {
              return 0;
            }

            return clamp(Math.max(0.4, sampled), 0, 1);
          };

          const startModelSpeak = (soundUrl, options) => {
            setLive2DSoundEnabled(live2dSoundConfigs, true);
            try {
              return model.speak(soundUrl, options);
            } finally {
              setLive2DSoundEnabled(live2dSoundConfigs, false);
            }
          };

          const stopLipSync = () => {
            if (syntheticLipSyncRaf) {
              cancelAnimationFrame(syntheticLipSyncRaf);
              syntheticLipSyncRaf = 0;
            }
            setMouthOpen(0);
          };

          const startSyntheticLipSync = (durationMs) => {
            if (syntheticLipSyncRaf) {
              cancelAnimationFrame(syntheticLipSyncRaf);
              syntheticLipSyncRaf = 0;
            }

            const startedAt = performance.now();
            const loop = () => {
              const elapsed = performance.now() - startedAt;
              if (elapsed >= durationMs) {
                syntheticLipSyncRaf = 0;
                setMouthOpen(0);
                return;
              }

              const progress = elapsed / 115;
              const wave = Math.abs(Math.sin(progress));
              setMouthOpen(0.1 + wave * 0.7);
              syntheticLipSyncRaf = requestAnimationFrame(loop);
            };

            syntheticLipSyncRaf = requestAnimationFrame(loop);
          };

          const scheduleStatusBackToBaseline = (delayMs) => {
            clearStatusTimer();
            statusResetTimer = setTimeout(() => {
              statusResetTimer = null;
              if (speechActive) {
                return;
              }
              if (thinkingActive) {
                applyThinkingState();
                return;
              }
              updateStatus("idle");
            }, delayMs);
          };

          const scheduleIdleMotionLoop = () => {
            clearIdleMotionLoop();
            idleMotionTimer = setTimeout(() => {
              idleMotionTimer = null;
              if (thinkingActive || speechActive) {
                return;
              }
              void playPrimaryMotion(idleMotionGroup);
              scheduleIdleMotionLoop();
            }, 4200 + Math.random() * 3600);
          };

          const enterIdle = (playImmediateMotion = true) => {
            if (thinkingActive || speechActive) {
              return;
            }

            clearStatusTimer();
            if (playImmediateMotion) {
              void playPrimaryMotion(idleMotionGroup);
            }
            updateStatus("idle");
            scheduleIdleMotionLoop();
          };

          const applyThinkingState = () => {
            clearStatusTimer();
            clearIdleMotionLoop();
            void (async () => {
              const ok = await playPrimaryMotion(thinkingMotionGroup, 1);
              if (!ok) {
                await playPrimaryMotion(thinkingMotionGroup);
              }
            })();
            updateStatus("thinking");
          };

          const runStateAction = (input) => {
            const durationMs = input.durationMs ?? 1700;
            clearIdleMotionLoop();
            clearStatusTimer();
            transientExpressionToken += 1;
            clearTransientExpressionRestore();

            void (async () => {
              if (typeof input.expression === "string" && input.expression.trim()) {
                await applyExpression(input.expression);
                scheduleExpressionRestore(durationMs);
              }

              if (typeof input.motionGroup === "string") {
                const ok = await playPrimaryMotion(input.motionGroup, input.motionIndex);
                if (!ok && input.motionGroup !== idleMotionGroup) {
                  await playPrimaryMotion(idleMotionGroup);
                }
              }
            })();

            if (input.syntheticLipSyncMs && input.syntheticLipSyncMs > 0) {
              startSyntheticLipSync(input.syntheticLipSyncMs);
            }

            if (input.pulse) {
              pulseModel();
            }

            updateStatus(input.status);
            scheduleStatusBackToBaseline(durationMs);
            scheduleIdleMotionLoop();
          };

          const runEmotionImpulseAction = (emotion, options = {}) => {
            const normalizedEmotion = typeof emotion === "string" ? emotion.trim().toLowerCase() : "";
            if (!normalizedEmotion) {
              return;
            }

            if (normalizedEmotion === "idle" || normalizedEmotion === "calm") {
              enterIdle(false);
              return;
            }

            if (emotionRenderer) {
              emotionRenderer.triggerImpulse(normalizedEmotion, {
                intensity: options.intensity,
                durationMs: options.durationMs
              });
            }

            const mapping = {
              happy: { motionGroup: motionBinding.happy },
              sad: { motionGroup: motionBinding.sad, motionIndex: 0 },
              angry: { motionGroup: motionBinding.angry },
              surprised: { motionGroup: motionBinding.surprised },
              shy: { motionGroup: motionBinding.shy },
              excited: { motionGroup: motionBinding.excited }
            };

            const action = mapping[normalizedEmotion];
            if (!action) {
              return;
            }

            clearIdleMotionLoop();
            clearStatusTimer();

            void (async () => {
              const ok = emotionMotionManager
                ? await playManagedMotion(emotionMotionManager, action.motionGroup, action.motionIndex)
                : await playPrimaryMotion(action.motionGroup, action.motionIndex);
              if (!ok && action.motionGroup !== idleMotionGroup && !speechActive && !thinkingActive) {
                await playPrimaryMotion(idleMotionGroup);
              }
            })();

            if (!speechActive && !thinkingActive) {
              updateStatus(`emotion · ${normalizedEmotion}`);
              scheduleStatusBackToBaseline(
                Math.max(650, Number.isFinite(options.durationMs) ? options.durationMs : 1850)
              );
              scheduleIdleMotionLoop();
            }
          };

          const stopCurrentAudio = () => {
            localSpeechToken += 1;
            try {
              model.stopSpeaking();
            } catch {}

            localSpeechActive = false;
            syncSpeechActive();
            stopLipSync();
            if (speechActive) {
              void ensureTalkingMotion();
              updateStatus("talking");
              return;
            }
            stopTalkingMotion();
          };

          const finishSpeech = (token) => {
            if (typeof token === "number" && token !== localSpeechToken) {
              return;
            }

            localSpeechActive = false;
            syncSpeechActive();
            stopLipSync();
            if (speechActive) {
              void ensureTalkingMotion();
              updateStatus("talking");
              return;
            }
            stopTalkingMotion();
            if (thinkingActive) {
              applyThinkingState();
              return;
            }
            enterIdle(false);
          };

          const applyRemoteSpeechState = (active) => {
            remoteSpeechActive = active;
            syncSpeechActive();
            if (speechActive) {
              clearIdleMotionLoop();
              clearStatusTimer();
              if (remoteSpeechActive) {
                pulseModel();
              }
              void ensureTalkingMotion();
              updateStatus("talking");
              return;
            }

            stopTalkingMotion();
            stopLipSync();
            setMouthOpen(0);
            if (thinkingActive) {
              applyThinkingState();
              return;
            }
            enterIdle(false);
          };

          const playPetSpeech = async (audioBase64, mimeType) => {
            const payload = typeof audioBase64 === "string" ? audioBase64.trim() : "";
            if (!payload) {
              return;
            }

            stopCurrentAudio();
            stopLipSync();

            const speechToken = localSpeechToken + 1;
            localSpeechToken = speechToken;
            const dataUrl = `data:${mimeType || "audio/mpeg"};base64,${payload}`;

            try {
              const ok = await startModelSpeak(dataUrl, {
                volume: 1,
                onFinish: () => {
                  finishSpeech(speechToken);
                },
                onError: () => {
                  if (speechToken !== localSpeechToken) {
                    return;
                  }
                  updateStatus("speech-error");
                  finishSpeech(speechToken);
                }
              });

              if (speechToken !== localSpeechToken) {
                return;
              }

              if (!ok) {
                updateStatus("speech-error");
                finishSpeech(speechToken);
                return;
              }

              localSpeechActive = true;
              syncSpeechActive();
              clearIdleMotionLoop();
              clearStatusTimer();
              pulseModel();
              void ensureTalkingMotion();
              updateStatus("talking");
            } catch {
              if (speechToken !== localSpeechToken) {
                return;
              }
              updateStatus("speech-error");
              finishSpeech(speechToken);
            }
          };

          const applyModelLayout = () => {
            const scale = clamp(baseScale * zoomScale, 0.03, 0.42);
            model.scale.set(scale);
            model.x = app.screen.width / 2;
            model.y = app.screen.height * 0.56;
          };

          const fitModel = () => {
            model.anchor.set(0.5, 0.5);
            model.scale.set(1);

            let nextScale = 0.11;
            try {
              const bounds = model.getLocalBounds();
              if (bounds.width > 0 && bounds.height > 0) {
                const targetWidth = app.screen.width * 0.72;
                const targetHeight = app.screen.height * 0.84;
                nextScale = Math.min(targetWidth / bounds.width, targetHeight / bounds.height);
                nextScale = clamp(nextScale, 0.05, 0.2);
              }
            } catch {}

            baseScale = nextScale;
            applyModelLayout();
          };

          const mapClientToCanvasPoint = (clientX, clientY) => {
            const rect = app.view.getBoundingClientRect();
            if (!rect || rect.width <= 0 || rect.height <= 0) {
              return null;
            }

            const pointX = ((clientX - rect.left) / rect.width) * app.renderer.width;
            const pointY = ((clientY - rect.top) / rect.height) * app.renderer.height;
            if (!Number.isFinite(pointX) || !Number.isFinite(pointY)) {
              return null;
            }

            return {
              x: pointX,
              y: pointY
            };
          };

          const classifyTapAreaFromBounds = (pointX, pointY) => {
            let bounds = null;
            try {
              bounds = model.getBounds();
            } catch {
              return null;
            }

            if (!bounds || bounds.width <= 0 || bounds.height <= 0) {
              return null;
            }

            const insetX = Math.max(16, bounds.width * 0.2);
            const insetY = Math.max(14, bounds.height * 0.12);
            const left = bounds.x + insetX;
            const right = bounds.x + bounds.width - insetX;
            const top = bounds.y + insetY;
            const bottom = bounds.y + bounds.height - insetY;

            if (pointX < left || pointX > right || pointY < top || pointY > bottom) {
              return null;
            }

            const headThreshold = top + (bottom - top) * 0.34;
            return pointY <= headThreshold ? "head" : "body";
          };

          const classifyTapArea = (pointX, pointY) => {
            const rawHitAreas = model.hitTest(pointX, pointY);
            if (!Array.isArray(rawHitAreas) || rawHitAreas.length === 0) {
              return classifyTapAreaFromBounds(pointX, pointY);
            }

            const normalizedAreas = normalizeHitAreas(rawHitAreas)
              .filter((area) => area.length > 0)
              .map((area) => area.toLowerCase());
            if (normalizedAreas.length === 0) {
              return classifyTapAreaFromBounds(pointX, pointY);
            }

            if (normalizedAreas.some((area) => area.includes("head") || area.includes("face"))) {
              return "head";
            }
            if (normalizedAreas.some((area) => area.includes("body") || area.includes("torso"))) {
              return "body";
            }

            if (hasNamedHitAreas) {
              return "body";
            }
            return classifyTapAreaFromBounds(pointX, pointY);
          };

          const isPointInsideChatPanel = (clientX, clientY) => {
            if (!chatPanelEl || chatPanelEl.classList.contains("hidden")) {
              return false;
            }

            const rect = chatPanelEl.getBoundingClientRect();
            if (!rect || rect.width <= 0 || rect.height <= 0) {
              return false;
            }

            return (
              clientX >= rect.left &&
              clientX <= rect.right &&
              clientY >= rect.top &&
              clientY <= rect.bottom
            );
          };

          const isPointerOverModel = (clientX, clientY) => {
            const point = mapClientToCanvasPoint(clientX, clientY);
            if (!point) {
              return false;
            }

            return classifyTapArea(point.x, point.y) !== null;
          };

          const syncPointerHitMode = (clientX, clientY) => {
            if (!Number.isFinite(clientX) || !Number.isFinite(clientY)) {
              return;
            }

            if (dragState.active) {
              setMousePassthrough(false);
              return;
            }

            const interactive = isPointInsideChatPanel(clientX, clientY) || isPointerOverModel(clientX, clientY);
            setMousePassthrough(!interactive);
          };

          const syncPointerHitModeByScreenPoint = (screenX, screenY, windowX, windowY) => {
            if (!Number.isFinite(screenX) || !Number.isFinite(screenY)) {
              return;
            }

            const offsetX = Number.isFinite(windowX) ? windowX : window.screenX;
            const offsetY = Number.isFinite(windowY) ? windowY : window.screenY;
            const clientX = screenX - offsetX;
            const clientY = screenY - offsetY;
            hasPointerSample = true;
            lastPointerClientX = clientX;
            lastPointerClientY = clientY;
            syncPointerHitMode(clientX, clientY);
          };

          const pollCursorPosition = async () => {
            if (cursorPollInFlight) {
              return;
            }

            cursorPollInFlight = true;
            try {
              const point = await petBridge.getCursorPosition();
              if (!point || typeof point !== "object") {
                return;
              }

              syncPointerHitModeByScreenPoint(
                Number(point.x),
                Number(point.y),
                Number(point.windowX),
                Number(point.windowY)
              );
            } catch {
              // ignore
            } finally {
              cursorPollInFlight = false;
            }
          };

          const startCursorPolling = () => {
            if (cursorPollTimer) {
              clearInterval(cursorPollTimer);
              cursorPollTimer = 0;
            }

            cursorPollTimer = window.setInterval(() => {
              void pollCursorPosition();
            }, CURSOR_POLL_INTERVAL_MS);
            void pollCursorPosition();
          };

          const stopCursorPolling = () => {
            if (!cursorPollTimer) {
              return;
            }
            clearInterval(cursorPollTimer);
            cursorPollTimer = 0;
          };

          const runTapMotion = (area) => {
            if (area === "head") {
              runStateAction({
                status: "tap-head",
                expression: "Blushing",
                motionGroup: motionBinding.tapHead,
                durationMs: 1700
              });
            } else {
              runStateAction({
                status: "tap-body",
                expression: "Surprised",
                motionGroup: motionBinding.tapBody,
                durationMs: 1700
              });
            }
          };

          const handleTapInteraction = (area) => {
            if (area !== "head" && area !== "body") {
              return;
            }
            runTapMotion(area);
          };

          const queuePetTap = (area) => {
            if (area !== "head" && area !== "body") {
              return;
            }

            const now = Date.now();
            if (pendingSingleTapTimer && now - lastTapAt <= DOUBLE_TAP_GAP_MS) {
              clearPendingSingleTap();
              lastTapAt = 0;
              setChatVisible(true);
              focusChatInput();
              return;
            }

            lastTapAt = now;
            clearPendingSingleTap();
            pendingSingleTapArea = area;
            pendingSingleTapTimer = setTimeout(() => {
              pendingSingleTapTimer = null;
              const areaToRun = pendingSingleTapArea;
              pendingSingleTapArea = null;
              if (!areaToRun) {
                return;
              }
              handleTapInteraction(areaToRun);
            }, SINGLE_TAP_DELAY_MS);
          };

          const dragState = {
            active: false,
            moved: false,
            startX: 0,
            startY: 0,
            prevX: 0,
            prevY: 0,
            dragDistance: 0
          };

          const stopDragging = () => {
            if (!dragState.active) {
              return;
            }

            if (dragState.moved) {
              suppressTapUntil = Date.now() + 180;
              clearPendingSingleTap();
            }

            dragState.active = false;
            dragState.moved = false;
            dragState.dragDistance = 0;
          };

          const isPointerInChatPanel = (target) =>
            Boolean(isElement(target) && target.closest && target.closest("#chat-panel"));

          window.addEventListener("mousedown", (event) => {
            hasPointerSample = true;
            lastPointerClientX = event.clientX;
            lastPointerClientY = event.clientY;

            if (event.button !== 0) {
              return;
            }
            if (isPointerInChatPanel(event.target)) {
              return;
            }

            dragState.active = true;
            dragState.moved = false;
            dragState.startX = event.screenX;
            dragState.startY = event.screenY;
            dragState.prevX = event.screenX;
            dragState.prevY = event.screenY;
            dragState.dragDistance = 0;
            setMousePassthrough(false);
          });

          window.addEventListener("mousemove", (event) => {
            hasPointerSample = true;
            lastPointerClientX = event.clientX;
            lastPointerClientY = event.clientY;
            syncPointerHitMode(event.clientX, event.clientY);

            if (!dragState.active) {
              return;
            }

            const distance = Math.hypot(event.screenX - dragState.startX, event.screenY - dragState.startY);
            dragState.dragDistance = distance;
            if (distance < DRAG_ACTIVATE_DISTANCE) {
              return;
            }

            const dx = event.screenX - dragState.prevX;
            const dy = event.screenY - dragState.prevY;
            if (dx === 0 && dy === 0) {
              return;
            }

            dragState.moved = true;
            dragState.prevX = event.screenX;
            dragState.prevY = event.screenY;
            petBridge.moveWindowBy({ dx, dy });
          });

          window.addEventListener("mouseup", (event) => {
            const wasActive = dragState.active;
            const wasMoved = dragState.moved;
            stopDragging();
            hasPointerSample = true;
            lastPointerClientX = event.clientX;
            lastPointerClientY = event.clientY;
            syncPointerHitMode(event.clientX, event.clientY);

            if (event.button !== 0 || !wasActive || wasMoved) {
              return;
            }

            if (isPointerInChatPanel(event.target)) {
              return;
            }

            if (Date.now() < suppressTapUntil) {
              return;
            }

            const point = mapClientToCanvasPoint(event.clientX, event.clientY);
            if (!point) {
              return;
            }

            const area = classifyTapArea(point.x, point.y);
            if (!area) {
              return;
            }

            queuePetTap(area);
          });
          window.addEventListener("blur", () => {
            stopDragging();
            clearPendingSingleTap();
            void cancelPushToTalkCapture("");
            setMousePassthrough(true);
          });
          window.addEventListener("mouseleave", (event) => {
            if (event.buttons === 0) {
              stopDragging();
              setMousePassthrough(true);
            }
          });
          window.addEventListener("mouseenter", (event) => {
            hasPointerSample = true;
            lastPointerClientX = event.clientX;
            lastPointerClientY = event.clientY;
            syncPointerHitMode(event.clientX, event.clientY);
          });

          rootEl.addEventListener(
            "wheel",
            (event) => {
              if (isPointerInChatPanel(event.target)) {
                return;
              }
              if (Math.abs(event.deltaY) < 0.01) {
                return;
              }

              event.preventDefault();
              const direction = event.deltaY < 0 ? 1 : -1;
              const nextScale = clamp(zoomScale + direction * 0.06, 0.65, 1.85);
              if (nextScale === zoomScale) {
                return;
              }

              zoomScale = nextScale;
              saveScalePreference(zoomScale);
              applyModelLayout();
              updateStatus(`scale · ${Math.round(zoomScale * 100)}%`);
              scheduleStatusBackToBaseline(900);
            },
            {
              passive: false
            }
          );

          fitModel();
          if (emotionRuntimeModule && typeof emotionRuntimeModule.createPetEmotionRenderer === "function") {
            emotionRenderer = emotionRuntimeModule.createPetEmotionRenderer({
              model,
              config: emotionConfig,
              debugLog
            });
            if (emotionRenderer) {
              emotionRenderer.reset();
              debugLog("emotion-runtime:ready", {
                slots: emotionRenderer.capabilities ? emotionRenderer.capabilities.slotCount : 0
              });
            }
          }
          app.stage.addChild(model);
          rootEl.appendChild(app.view);
          app.view.style.position = "absolute";
          app.view.style.inset = "0";
          app.view.style.zIndex = "10";
          app.ticker.add(() => {
            if (emotionRenderer && localSpeechActive) {
              emotionRenderer.setLipSyncOpen(sampleModelLipSyncOpen());
            }
            model.update(app.ticker.deltaMS);
          });

          window.addEventListener("resize", () => {
            app.renderer.resize(window.innerWidth, window.innerHeight);
            stageHitArea.width = app.renderer.width;
            stageHitArea.height = app.renderer.height;
            fitModel();
            if (hasPointerSample) {
              syncPointerHitMode(lastPointerClientX, lastPointerClientY);
            }
          });

          setMousePassthrough(true);
          startCursorPolling();
          window.addEventListener("beforeunload", () => {
            stopCursorPolling();
            unsubscribePetEvents();
            void cancelPushToTalkCapture("");
            if (emotionRenderer) {
              emotionRenderer.destroy();
            }
            setMousePassthrough(false);
          });

          if (chatCloseEl) {
            chatCloseEl.addEventListener("click", () => {
              closeChatPanel();
            });
          }

          if (chatFormEl) {
            chatFormEl.addEventListener("submit", async (event) => {
              event.preventDefault();
              if (!chatInputEl) {
                return;
              }

              const text = chatInputEl.value.trim();
              if (!text) {
                focusChatInput();
                return;
              }

              setChatVisible(true);
              appendChatMessage("user", text);
              chatInputEl.value = "";

              const pendingEl = appendChatMessage("assistant", "思考中...", {
                pending: true
              });
              setChatSubmitting(true);
              const requestToken = ++chatRequestToken;

              try {
                const response = await petBridge.sendChat(text);
                if (requestToken !== chatRequestToken) {
                  return;
                }

                const replyText =
                  response &&
                  typeof response === "object" &&
                  typeof response.replyText === "string" &&
                  response.replyText.trim().length > 0
                    ? response.replyText.trim()
                    : "我听见啦。";

                if (pendingEl) {
                  pendingEl.classList.remove("pending");
                  pendingEl.textContent = replyText;
                } else {
                  appendChatMessage("assistant", replyText);
                }
              } catch (error) {
                const message =
                  error && typeof error === "object" && "message" in error
                    ? String(error.message)
                    : "处理消息时出错，请稍后再试";
                if (pendingEl) {
                  pendingEl.classList.remove("pending");
                  pendingEl.textContent = message;
                } else {
                  appendChatMessage("assistant", message);
                }
              } finally {
                if (requestToken === chatRequestToken) {
                  setChatSubmitting(false);
                  focusChatInput();
                }
              }
            });
          }

          window.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && isChatVisible()) {
              closeChatPanel();
            }
          });

          window.addEventListener("contextmenu", (event) => {
            if (isPointerInChatPanel(event.target)) {
              return;
            }

            event.preventDefault();
            petBridge.showContextMenu({
              x: Math.round(event.x),
              y: Math.round(event.y)
            });
          });

          enterIdle(true);

          const unsubscribePetEvents = petBridge.onEvent((data) => {
            if (!data || typeof data !== "object") {
              return;
            }

            if (data.type === "ptt") {
              const state = typeof data.state === "string" ? data.state : "";
              if (state === "start") {
                void startPushToTalkCapture();
                return;
              }

              if (state === "stop") {
                void stopPushToTalkCapture();
                return;
              }

              if (state === "cancel") {
                const reason = typeof data.reason === "string" ? data.reason : "";
                void cancelPushToTalkCapture(reason);
              }
              return;
            }

            if (data.type === "thinking") {
              if (data.value === "start") {
                thinkingActive = true;
                applyThinkingState();
              } else if (data.value === "stop") {
                thinkingActive = false;
                if (!speechActive) {
                  enterIdle(false);
                }
              }
              return;
            }

            if (data.type === "talking") {
              pulseModel();
              if (!speechActive) {
                updateStatus("talking");
                scheduleStatusBackToBaseline(900);
              }
              return;
            }

            if (data.type === "expression") {
              void applySelectedExpression(typeof data.id === "string" ? data.id : "");
              return;
            }

            if (data.type === "emotion-state") {
              if (emotionRenderer && data.emotional && typeof data.emotional === "object") {
                emotionRenderer.setTargetEmotion(data.emotional);
              }
              return;
            }

            if (data.type === "emotion-impulse") {
              runEmotionImpulseAction(data.name, {
                intensity: data.intensity,
                durationMs: data.durationMs
              });
              return;
            }

            if (data.type === "emotion") {
              runEmotionImpulseAction(data.value);
              return;
            }

            if (data.type === "speech") {
              void playPetSpeech(data.audioBase64, data.mimeType);
              return;
            }

            if (data.type === "voice-state") {
              applyRemoteSpeechState(data.phase === "assistant-speaking");
              return;
            }

            if (data.type === "speech-level") {
              if (remoteSpeechActive && !localSpeechActive) {
                setMouthOpen(Number.isFinite(data.level) ? data.level : 0);
              }
            }
          });
        } catch (error) {
          console.error(error);
          const reason = error && error.message ? `load-error:${String(error.message).slice(0, 42)}` : "load-error";
          debugLog("boot:error", reason);
          showFallback(reason, resolveFallbackImage());
        }
      }

      setTimeout(() => {
        void boot();
      }, 0);
    </script>
  </body>
</html>
