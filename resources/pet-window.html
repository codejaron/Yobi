<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yobi Pet</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: "Helvetica Neue", "PingFang SC", sans-serif;
      }

      #root {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      #status {
        display: none;
      }

      #chat-panel {
        position: absolute;
        right: 12px;
        bottom: 12px;
        width: min(300px, calc(100% - 24px));
        border-radius: 14px;
        background: rgba(16, 18, 26, 0.86);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(8px);
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 12;
      }

      #chat-panel.hidden {
        display: none;
      }

      #chat-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: rgba(255, 255, 255, 0.82);
        font-size: 12px;
      }

      #chat-close {
        border: none;
        border-radius: 999px;
        width: 22px;
        height: 22px;
        background: rgba(255, 255, 255, 0.18);
        color: #fff;
        cursor: pointer;
      }

      #chat-log {
        max-height: 170px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .chat-msg {
        border-radius: 10px;
        padding: 6px 8px;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .chat-msg.user {
        align-self: flex-end;
        background: rgba(80, 171, 255, 0.9);
        color: #fff;
      }

      .chat-msg.assistant {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.92);
        color: #1f2430;
      }

      .chat-msg.pending {
        opacity: 0.76;
      }

      #chat-form {
        display: flex;
        gap: 6px;
      }

      #chat-input {
        flex: 1;
        min-width: 0;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: rgba(255, 255, 255, 0.95);
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 13px;
        outline: none;
      }

      #chat-send {
        border: none;
        border-radius: 10px;
        padding: 0 11px;
        background: #4f8cff;
        color: #fff;
        font-size: 12px;
        cursor: pointer;
      }

      #chat-send:disabled,
      #chat-input:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      #fallback {
        width: 220px;
        height: 220px;
        display: none;
        align-items: center;
        justify-content: center;
        background: transparent;
        color: #2f2014;
        font-weight: 700;
      }

      .badge {
        border-radius: 999px;
        padding: 8px 14px;
        background: rgba(242, 176, 106, 0.85);
        box-shadow: 0 16px 42px rgba(0, 0, 0, 0.25);
      }

      .pulse {
        animation: pulse 0.45s ease-in-out 3;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.04);
        }
        100% {
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="fallback"></div>
      <div id="status">idle</div>
      <div id="chat-panel" class="hidden">
        <div id="chat-topbar">
          <span>和 Yobi 聊天</span>
          <button id="chat-close" type="button">×</button>
        </div>
        <div id="chat-log"></div>
        <form id="chat-form">
          <input id="chat-input" type="text" maxlength="500" placeholder="点这里和我聊天..." />
          <button id="chat-send" type="submit">发送</button>
        </form>
      </div>
    </div>

    <script>
      const { ipcRenderer } = require("electron");
      const fs = require("node:fs");
      const path = require("node:path");

      const statusEl = document.getElementById("status");
      const fallbackEl = document.getElementById("fallback");
      const rootEl = document.getElementById("root");
      const chatPanelEl = document.getElementById("chat-panel");
      const chatLogEl = document.getElementById("chat-log");
      const chatFormEl = document.getElementById("chat-form");
      const chatInputEl = document.getElementById("chat-input");
      const chatSendEl = document.getElementById("chat-send");
      const chatCloseEl = document.getElementById("chat-close");

      const params = new URLSearchParams(window.location.search);
      const modelDir = params.get("modelDir") || "";
      const appPath = params.get("appPath") || "";
      const PET_SCALE_STORAGE_KEY = "yobi.pet.scale.v1";

      const updateStatus = (text) => {
        statusEl.textContent = text;
      };

      const isElement = (value) => value && typeof value === "object" && "closest" in value;

      const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

      const readScalePreference = () => {
        try {
          const raw = localStorage.getItem(PET_SCALE_STORAGE_KEY);
          if (!raw) {
            return 1;
          }

          const parsed = Number(raw);
          if (!Number.isFinite(parsed)) {
            return 1;
          }

          return clamp(parsed, 0.65, 1.85);
        } catch {
          return 1;
        }
      };

      const saveScalePreference = (value) => {
        try {
          localStorage.setItem(PET_SCALE_STORAGE_KEY, String(clamp(value, 0.65, 1.85)));
        } catch {}
      };

      const normalizeHitAreas = (areas) => {
        if (!Array.isArray(areas)) {
          return [];
        }

        return areas
          .filter((value) => typeof value === "string")
          .map((value) => value.trim());
      };

      const normalizeMotionDefinitions = (input) => {
        if (!input || typeof input !== "object") {
          return {};
        }

        const entries = input instanceof Map ? Array.from(input.entries()) : Object.entries(input);
        const normalized = {};

        for (const [group, bucket] of entries) {
          const key = typeof group === "string" ? group : String(group || "");
          normalized[key] = Array.isArray(bucket) ? bucket : [];
        }

        return normalized;
      };

      const readMotionDefinitionsFromModelJson = (modelJsonPath) => {
        if (!modelJsonPath) {
          return {};
        }

        try {
          const raw = fs.readFileSync(modelJsonPath, "utf-8");
          const parsed = JSON.parse(raw);
          const motions = parsed?.FileReferences?.Motions;
          return normalizeMotionDefinitions(motions);
        } catch {
          return {};
        }
      };

      const readHitAreaNamesFromModelJson = (modelJsonPath) => {
        if (!modelJsonPath) {
          return [];
        }

        try {
          const raw = fs.readFileSync(modelJsonPath, "utf-8");
          const parsed = JSON.parse(raw);
          const hitAreas = Array.isArray(parsed?.HitAreas) ? parsed.HitAreas : [];

          return hitAreas
            .map((item) => (item && typeof item.Name === "string" ? item.Name.trim() : ""))
            .filter((name) => name.length > 0);
        } catch {
          return [];
        }
      };

      const walkFiles = (baseDir) => {
        const result = [];
        if (!baseDir || !fs.existsSync(baseDir)) {
          return result;
        }

        const stack = [baseDir];
        while (stack.length > 0) {
          const dir = stack.pop();
          let entries = [];

          try {
            entries = fs.readdirSync(dir, { withFileTypes: true });
          } catch {
            continue;
          }

          for (const entry of entries) {
            const fullPath = path.join(dir, entry.name);
            if (entry.isDirectory()) {
              stack.push(fullPath);
              continue;
            }

            if (entry.isFile()) {
              result.push(fullPath);
            }
          }
        }

        return result;
      };

      const pickFile = (patternFn) => {
        const files = walkFiles(modelDir);
        return files.find(patternFn) || null;
      };

      const showFallback = (reason) => {
        fallbackEl.style.display = "flex";
        fallbackEl.innerHTML = `<div class="badge">Yobi</div>`;
        updateStatus(`fallback · ${reason}`);
      };

      const loadScript = (src) =>
        new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.onload = () => resolve();
          script.onerror = () => reject(new Error(`Failed to load ${src}`));
          document.head.appendChild(script);
        });

      const resolveCubismCoreCandidates = () => {
        const candidates = [
          path.join(modelDir, "live2dcubismcore.min.js"),
          path.join(modelDir, "runtime", "live2dcubismcore.min.js"),
          appPath ? path.join(appPath, "resources", "live2dcubismcore.min.js") : "",
          appPath ? path.join(appPath, "resources", "vendor", "live2dcubismcore.min.js") : ""
        ].filter(Boolean);

        return Array.from(new Set(candidates));
      };

      const loadCubismCore = async () => {
        const candidates = resolveCubismCoreCandidates();
        for (const filePath of candidates) {
          if (!fs.existsSync(filePath)) {
            continue;
          }

          try {
            await loadScript(`file://${encodeURI(filePath)}`);
            if (window.Live2DCubismCore) {
              return { ok: true, source: filePath };
            }
          } catch {}
        }

        try {
          await loadScript("https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js");
          if (window.Live2DCubismCore) {
            return { ok: true, source: "cdn" };
          }
        } catch {}

        return { ok: false };
      };

      const loadRuntime = async () => {
        let PIXI = null;
        let Live2DModel = null;

        try {
          PIXI = require("pixi.js");
          window.PIXI = PIXI;
        } catch {}

        try {
          const mod = require("pixi-live2d-display/cubism4");
          Live2DModel = mod?.Live2DModel || null;
        } catch {}

        if (!Live2DModel) {
          try {
            const mod = require("pixi-live2d-display");
            Live2DModel = mod?.Live2DModel || mod?.default?.Live2DModel || null;
          } catch {}
        }

        if (!PIXI || !Live2DModel) {
          try {
            const coreState = await loadCubismCore();
            if (!coreState.ok) {
              return {
                error: "missing-cubism-core"
              };
            }

            await loadScript("../node_modules/pixi.js/dist/browser/pixi.min.js");
            await loadScript("../node_modules/pixi-live2d-display/dist/cubism4.min.js");
            PIXI = window.PIXI;
            Live2DModel = window.PIXI?.live2d?.Live2DModel || null;
          } catch (error) {
            return {
              error: error && error.message ? String(error.message) : "script-load-failed"
            };
          }
        }

        if (!PIXI || !Live2DModel) {
          return {
            error: "runtime-not-ready"
          };
        }

        return { PIXI, Live2DModel };
      };

      async function boot() {
        const modelJsonPath = pickFile((file) => file.endsWith(".model3.json"));
        if (!modelJsonPath) {
          showFallback("missing-model3.json");
          return;
        }

        try {
          const runtime = await loadRuntime();
          if (!runtime || !runtime.PIXI || !runtime.Live2DModel) {
            const reason = runtime && runtime.error ? runtime.error : "missing-deps";
            showFallback(`missing-deps:${reason}`);
            return;
          }
          const { PIXI, Live2DModel } = runtime;

          const app = new PIXI.Application({
            width: window.innerWidth,
            height: window.innerHeight,
            transparent: true,
            autoStart: true,
            antialias: true
          });

          rootEl.appendChild(app.view);
          app.stage.interactive = true;
          const stageHitArea = new PIXI.Rectangle(0, 0, app.renderer.width, app.renderer.height);
          app.stage.hitArea = stageHitArea;

          const model = await Live2DModel.from(`file://${encodeURI(modelJsonPath)}`, {
            autoInteract: false
          });
          model.interactive = true;

          const expressionDefinitionsRaw =
            model?.internalModel?.motionManager?.expressionManager?.definitions || {};
          const expressionDefinitions =
            expressionDefinitionsRaw instanceof Map
              ? Object.fromEntries(expressionDefinitionsRaw.entries())
              : expressionDefinitionsRaw;
          const availableExpressions = new Set(Object.keys(expressionDefinitions));

          const runtimeMotionDefinitions = normalizeMotionDefinitions(
            model?.internalModel?.motionManager?.definitions
          );
          const modelJsonMotionDefinitions = readMotionDefinitionsFromModelJson(modelJsonPath);
          const namedHitAreasFromModelJson = readHitAreaNamesFromModelJson(modelJsonPath);
          const hasNamedHitAreas = namedHitAreasFromModelJson.length > 0;
          const motionDefinitions = {
            ...runtimeMotionDefinitions,
            ...modelJsonMotionDefinitions
          };
          const motionGroupNames = Object.keys(motionDefinitions).filter(
            (name) => Array.isArray(motionDefinitions[name]) && motionDefinitions[name].length > 0
          );
          const normalizedMotionGroupNames = motionGroupNames.map((name) => ({
            name,
            normalized: name.trim().toLowerCase()
          }));

          const findMotionGroup = (candidates, options = {}) => {
            const allowAny = options.allowAny === true;
            const includeEmpty = options.includeEmpty === true;

            for (const candidate of candidates) {
              const normalizedCandidate = candidate.trim().toLowerCase();
              if (!normalizedCandidate) {
                continue;
              }

              const exact = normalizedMotionGroupNames.find(
                (entry) => entry.normalized === normalizedCandidate
              );
              if (exact) {
                return exact.name;
              }
            }

            for (const candidate of candidates) {
              const normalizedCandidate = candidate.trim().toLowerCase();
              if (!normalizedCandidate) {
                continue;
              }

              const fuzzy = normalizedMotionGroupNames.find((entry) =>
                entry.normalized.includes(normalizedCandidate)
              );
              if (fuzzy) {
                return fuzzy.name;
              }
            }

            if (!allowAny) {
              return null;
            }

            const nonEmptyFallback = normalizedMotionGroupNames.find((entry) => entry.normalized.length > 0);
            if (nonEmptyFallback) {
              return nonEmptyFallback.name;
            }

            if (includeEmpty && motionGroupNames.length > 0) {
              return motionGroupNames[0];
            }

            return null;
          };

          const motionBinding = {
            idle: findMotionGroup(["idle"], {
              allowAny: true,
              includeEmpty: true
            }),
            thinking: findMotionGroup(["idle", "think", "thinking"], {
              allowAny: true,
              includeEmpty: true
            }),
            talking: findMotionGroup(["tap", "talk", "speak", "voice"], {
              allowAny: true,
              includeEmpty: true
            }),
            tapHead: findMotionGroup(["flick", "head", "taphead", "touchhead"], {
              allowAny: true,
              includeEmpty: true
            }),
            tapBody: findMotionGroup(["tap", "body", "tapbody", "touchbody"], {
              allowAny: true,
              includeEmpty: true
            }),
            happy: findMotionGroup(["flickright", "happy", "smile"], {
              allowAny: true,
              includeEmpty: true
            }),
            sad: findMotionGroup(["idle", "sad", "down"], {
              allowAny: true,
              includeEmpty: true
            }),
            angry: findMotionGroup(["shake", "angry", "mad"], {
              allowAny: true,
              includeEmpty: true
            }),
            surprised: findMotionGroup(["flick", "surprised", "surprise"], {
              allowAny: true,
              includeEmpty: true
            }),
            shy: findMotionGroup(["idle", "shy", "blush"], {
              allowAny: true,
              includeEmpty: true
            }),
            excited: findMotionGroup(["flick3", "excited", "flickright"], {
              allowAny: true,
              includeEmpty: true
            })
          };
          const firstDefinedMotionGroup = (...groups) => {
            for (const group of groups) {
              if (typeof group === "string") {
                return group;
              }
            }
            return null;
          };
          const idleMotionGroup = firstDefinedMotionGroup(
            motionBinding.idle,
            motionBinding.talking,
            motionGroupNames[0]
          );
          const thinkingMotionGroup = firstDefinedMotionGroup(motionBinding.thinking, idleMotionGroup);
          const talkingMotionGroup = firstDefinedMotionGroup(
            motionBinding.talking,
            motionBinding.tapBody,
            idleMotionGroup
          );

          let baseScale = 0.11;
          let zoomScale = readScalePreference();
          let statusResetTimer = null;
          let idleMotionTimer = null;
          let suppressTapUntil = 0;
          let thinkingActive = false;
          let speechActive = false;
          let activeAudio = null;
          let syntheticLipSyncRaf = 0;
          let audioLipSyncRaf = 0;
          let audioContext = null;
          let audioAnalyser = null;
          let audioAnalyserData = null;
          let audioSourceNode = null;
          let chatRequestToken = 0;
          let pendingSingleTapTimer = null;
          let pendingSingleTapArea = null;
          let lastTapAt = 0;
          let mousePassthrough = false;
          let hasPointerSample = false;
          let lastPointerClientX = 0;
          let lastPointerClientY = 0;
          let cursorPollTimer = 0;
          let cursorPollInFlight = false;

          const MOUTH_PARAMETER_ID = "PARAM_MOUTH_OPEN_Y";
          const MOTION_PRIORITY_FORCE = 3;
          const SINGLE_TAP_DELAY_MS = 340;
          const DOUBLE_TAP_GAP_MS = 320;
          const DRAG_ACTIVATE_DISTANCE = 8;
          const CURSOR_POLL_INTERVAL_MS = 48;

          const setChatVisible = (visible) => {
            if (!chatPanelEl) {
              return;
            }

            if (visible) {
              chatPanelEl.classList.remove("hidden");
            } else {
              chatPanelEl.classList.add("hidden");
            }
          };

          const setMousePassthrough = (ignore) => {
            if (mousePassthrough === ignore) {
              return;
            }
            mousePassthrough = ignore;
            ipcRenderer.send("pet:window:set-ignore-mouse-events", {
              ignore,
              forward: true
            });
          };

          const isChatVisible = () => Boolean(chatPanelEl && !chatPanelEl.classList.contains("hidden"));

          const focusChatInput = () => {
            if (!chatInputEl) {
              return;
            }

            chatInputEl.focus();
          };

          const appendChatMessage = (role, text, options = {}) => {
            if (!chatLogEl) {
              return null;
            }

            const messageEl = document.createElement("div");
            messageEl.className = `chat-msg ${role}${options.pending ? " pending" : ""}`;
            messageEl.textContent = text;
            chatLogEl.appendChild(messageEl);

            while (chatLogEl.children.length > 16) {
              chatLogEl.removeChild(chatLogEl.firstChild);
            }

            chatLogEl.scrollTop = chatLogEl.scrollHeight;
            return messageEl;
          };

          const setChatSubmitting = (submitting) => {
            if (chatInputEl) {
              chatInputEl.disabled = submitting;
            }
            if (chatSendEl) {
              chatSendEl.disabled = submitting;
            }
          };

          const resetChatSession = () => {
            chatRequestToken += 1;
            setChatSubmitting(false);
            if (chatInputEl) {
              chatInputEl.value = "";
            }
            if (chatLogEl) {
              chatLogEl.replaceChildren();
            }
          };

          const closeChatPanel = () => {
            setChatVisible(false);
            resetChatSession();
            if (hasPointerSample) {
              syncPointerHitMode(lastPointerClientX, lastPointerClientY);
            }
          };

          const clearStatusTimer = () => {
            if (statusResetTimer) {
              clearTimeout(statusResetTimer);
              statusResetTimer = null;
            }
          };

          const clearIdleMotionLoop = () => {
            if (idleMotionTimer) {
              clearTimeout(idleMotionTimer);
              idleMotionTimer = null;
            }
          };

          const clearPendingSingleTap = () => {
            if (pendingSingleTapTimer) {
              clearTimeout(pendingSingleTapTimer);
              pendingSingleTapTimer = null;
            }
            pendingSingleTapArea = null;
          };

          const motionCount = (group) => {
            if (typeof group !== "string") {
              return 0;
            }
            const bucket = motionDefinitions[group];
            return Array.isArray(bucket) ? bucket.length : 0;
          };

          const playMotion = (group, index) => {
            if (typeof group !== "string") {
              return false;
            }
            const count = motionCount(group);
            if (count <= 0) {
              return false;
            }

            try {
              const nextIndex =
                Number.isInteger(index) && index >= 0 && index < count
                  ? index
                  : Math.floor(Math.random() * count);
              model.motion(group, nextIndex, MOTION_PRIORITY_FORCE);
              return true;
            } catch {
              return false;
            }
          };

          const applyExpression = (name) => {
            if (!name) {
              return;
            }

            if (availableExpressions.size > 0 && !availableExpressions.has(name)) {
              return;
            }

            try {
              model.expression(name);
            } catch {}
          };

          const setMouthOpen = (value) => {
            const clamped = clamp(value, 0, 1);
            try {
              model.internalModel?.coreModel?.setParameterValueById?.(MOUTH_PARAMETER_ID, clamped);
            } catch {}
          };

          const pulseModel = () => {
            rootEl.classList.add("pulse");
            setTimeout(() => rootEl.classList.remove("pulse"), 1600);
          };

          const stopLipSync = () => {
            if (syntheticLipSyncRaf) {
              cancelAnimationFrame(syntheticLipSyncRaf);
              syntheticLipSyncRaf = 0;
            }

            if (audioLipSyncRaf) {
              cancelAnimationFrame(audioLipSyncRaf);
              audioLipSyncRaf = 0;
            }

            if (audioSourceNode) {
              try {
                audioSourceNode.disconnect();
              } catch {}
              audioSourceNode = null;
            }

            if (audioAnalyser) {
              try {
                audioAnalyser.disconnect();
              } catch {}
              audioAnalyser = null;
            }

            audioAnalyserData = null;
            if (audioContext) {
              const contextRef = audioContext;
              audioContext = null;
              void contextRef.close().catch(() => undefined);
            }

            setMouthOpen(0);
          };

          const startSyntheticLipSync = (durationMs) => {
            if (syntheticLipSyncRaf) {
              cancelAnimationFrame(syntheticLipSyncRaf);
              syntheticLipSyncRaf = 0;
            }
            if (audioLipSyncRaf) {
              cancelAnimationFrame(audioLipSyncRaf);
              audioLipSyncRaf = 0;
            }

            const startedAt = performance.now();
            const loop = () => {
              const elapsed = performance.now() - startedAt;
              if (elapsed >= durationMs) {
                syntheticLipSyncRaf = 0;
                setMouthOpen(0);
                return;
              }

              const progress = elapsed / 115;
              const wave = Math.abs(Math.sin(progress));
              setMouthOpen(0.1 + wave * 0.7);
              syntheticLipSyncRaf = requestAnimationFrame(loop);
            };

            syntheticLipSyncRaf = requestAnimationFrame(loop);
          };

          const startAudioLipSync = (audio) => {
            stopLipSync();

            const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextCtor) {
              startSyntheticLipSync(1800);
              return;
            }

            try {
              audioContext = new AudioContextCtor();
              audioAnalyser = audioContext.createAnalyser();
              audioAnalyser.fftSize = 256;
              audioAnalyserData = new Uint8Array(audioAnalyser.frequencyBinCount);
              audioSourceNode = audioContext.createMediaElementSource(audio);
              audioSourceNode.connect(audioAnalyser);
              audioAnalyser.connect(audioContext.destination);

              if (audioContext.state === "suspended") {
                void audioContext.resume().catch(() => undefined);
              }

              const loop = () => {
                if (!audioAnalyser || !audioAnalyserData || !speechActive) {
                  audioLipSyncRaf = 0;
                  setMouthOpen(0);
                  return;
                }

                audioAnalyser.getByteTimeDomainData(audioAnalyserData);
                let energy = 0;
                for (let index = 0; index < audioAnalyserData.length; index += 1) {
                  const normalized = (audioAnalyserData[index] - 128) / 128;
                  energy += normalized * normalized;
                }
                const rms = Math.sqrt(energy / audioAnalyserData.length);
                setMouthOpen(rms * 8);
                audioLipSyncRaf = requestAnimationFrame(loop);
              };

              audioLipSyncRaf = requestAnimationFrame(loop);
            } catch {
              startSyntheticLipSync(1800);
            }
          };

          const scheduleStatusBackToBaseline = (delayMs) => {
            clearStatusTimer();
            statusResetTimer = setTimeout(() => {
              statusResetTimer = null;
              if (speechActive) {
                return;
              }
              if (thinkingActive) {
                applyThinkingState();
                return;
              }
              applyExpression("Normal");
              updateStatus("idle");
            }, delayMs);
          };

          const scheduleIdleMotionLoop = () => {
            clearIdleMotionLoop();
            idleMotionTimer = setTimeout(() => {
              idleMotionTimer = null;
              if (thinkingActive || speechActive) {
                return;
              }
              playMotion(idleMotionGroup);
              scheduleIdleMotionLoop();
            }, 4200 + Math.random() * 3600);
          };

          const enterIdle = (playImmediateMotion = true) => {
            if (thinkingActive || speechActive) {
              return;
            }

            clearStatusTimer();
            applyExpression("Normal");
            if (playImmediateMotion) {
              playMotion(idleMotionGroup);
            }
            updateStatus("idle");
            scheduleIdleMotionLoop();
          };

          const applyThinkingState = () => {
            clearStatusTimer();
            clearIdleMotionLoop();
            applyExpression("Normal");
            if (!playMotion(thinkingMotionGroup, 1)) {
              playMotion(thinkingMotionGroup);
            }
            updateStatus("thinking");
          };

          const runStateAction = (input) => {
            const durationMs = input.durationMs ?? 1700;
            clearIdleMotionLoop();
            clearStatusTimer();

            if (input.expression) {
              applyExpression(input.expression);
            }

            if (typeof input.motionGroup === "string") {
              const ok = playMotion(input.motionGroup, input.motionIndex);
              if (!ok && input.motionGroup !== idleMotionGroup) {
                playMotion(idleMotionGroup);
              }
            }

            if (input.syntheticLipSyncMs && input.syntheticLipSyncMs > 0) {
              startSyntheticLipSync(input.syntheticLipSyncMs);
            }

            if (input.pulse) {
              pulseModel();
            }

            updateStatus(input.status);
            scheduleStatusBackToBaseline(durationMs);
            scheduleIdleMotionLoop();
          };

          const stopCurrentAudio = () => {
            if (!activeAudio) {
              return;
            }

            try {
              activeAudio.pause();
              activeAudio.src = "";
              activeAudio.load();
            } catch {}

            speechActive = false;
            activeAudio = null;
            stopLipSync();
          };

          const finishSpeech = () => {
            speechActive = false;
            activeAudio = null;
            stopLipSync();
            if (thinkingActive) {
              applyThinkingState();
              return;
            }
            enterIdle(false);
          };

          const playPetSpeech = (audioBase64, mimeType) => {
            const payload = typeof audioBase64 === "string" ? audioBase64.trim() : "";
            if (!payload) {
              return;
            }

            stopCurrentAudio();

            const audio = new Audio(`data:${mimeType || "audio/mpeg"};base64,${payload}`);
            activeAudio = audio;
            audio.volume = 1;

            audio.onplay = () => {
              speechActive = true;
              clearIdleMotionLoop();
              clearStatusTimer();
              pulseModel();
              playMotion(talkingMotionGroup);
              startAudioLipSync(audio);
              updateStatus("talking");
            };

            audio.onended = () => {
              if (activeAudio !== audio) {
                return;
              }
              finishSpeech();
            };

            audio.onerror = () => {
              if (activeAudio !== audio) {
                return;
              }
              updateStatus("speech-error");
              finishSpeech();
            };

            audio.play().catch(() => {
              if (activeAudio !== audio) {
                return;
              }
              updateStatus("speech-blocked");
              finishSpeech();
            });
          };

          const applyModelLayout = () => {
            const scale = clamp(baseScale * zoomScale, 0.03, 0.42);
            model.scale.set(scale);
            model.x = app.screen.width / 2;
            model.y = app.screen.height * 0.56;
          };

          const fitModel = () => {
            model.anchor.set(0.5, 0.5);
            model.scale.set(1);

            let nextScale = 0.11;
            try {
              const bounds = model.getLocalBounds();
              if (bounds.width > 0 && bounds.height > 0) {
                const targetWidth = app.screen.width * 0.72;
                const targetHeight = app.screen.height * 0.84;
                nextScale = Math.min(targetWidth / bounds.width, targetHeight / bounds.height);
                nextScale = clamp(nextScale, 0.05, 0.2);
              }
            } catch {}

            baseScale = nextScale;
            applyModelLayout();
          };

          const mapClientToCanvasPoint = (clientX, clientY) => {
            const rect = app.view.getBoundingClientRect();
            if (!rect || rect.width <= 0 || rect.height <= 0) {
              return null;
            }

            const pointX = ((clientX - rect.left) / rect.width) * app.renderer.width;
            const pointY = ((clientY - rect.top) / rect.height) * app.renderer.height;
            if (!Number.isFinite(pointX) || !Number.isFinite(pointY)) {
              return null;
            }

            return {
              x: pointX,
              y: pointY
            };
          };

          const classifyTapAreaFromBounds = (pointX, pointY) => {
            let bounds = null;
            try {
              bounds = model.getBounds();
            } catch {
              return null;
            }

            if (!bounds || bounds.width <= 0 || bounds.height <= 0) {
              return null;
            }

            const insetX = Math.max(16, bounds.width * 0.2);
            const insetY = Math.max(14, bounds.height * 0.12);
            const left = bounds.x + insetX;
            const right = bounds.x + bounds.width - insetX;
            const top = bounds.y + insetY;
            const bottom = bounds.y + bounds.height - insetY;

            if (pointX < left || pointX > right || pointY < top || pointY > bottom) {
              return null;
            }

            const headThreshold = top + (bottom - top) * 0.34;
            return pointY <= headThreshold ? "head" : "body";
          };

          const classifyTapArea = (pointX, pointY) => {
            const rawHitAreas = model.hitTest(pointX, pointY);
            if (!Array.isArray(rawHitAreas) || rawHitAreas.length === 0) {
              return classifyTapAreaFromBounds(pointX, pointY);
            }

            const normalizedAreas = normalizeHitAreas(rawHitAreas)
              .filter((area) => area.length > 0)
              .map((area) => area.toLowerCase());
            if (normalizedAreas.length === 0) {
              return classifyTapAreaFromBounds(pointX, pointY);
            }

            if (normalizedAreas.some((area) => area.includes("head") || area.includes("face"))) {
              return "head";
            }
            if (normalizedAreas.some((area) => area.includes("body") || area.includes("torso"))) {
              return "body";
            }

            if (hasNamedHitAreas) {
              return "body";
            }
            return classifyTapAreaFromBounds(pointX, pointY);
          };

          const isPointInsideChatPanel = (clientX, clientY) => {
            if (!chatPanelEl || chatPanelEl.classList.contains("hidden")) {
              return false;
            }

            const rect = chatPanelEl.getBoundingClientRect();
            if (!rect || rect.width <= 0 || rect.height <= 0) {
              return false;
            }

            return (
              clientX >= rect.left &&
              clientX <= rect.right &&
              clientY >= rect.top &&
              clientY <= rect.bottom
            );
          };

          const isPointerOverModel = (clientX, clientY) => {
            const point = mapClientToCanvasPoint(clientX, clientY);
            if (!point) {
              return false;
            }

            return classifyTapArea(point.x, point.y) !== null;
          };

          const syncPointerHitMode = (clientX, clientY) => {
            if (!Number.isFinite(clientX) || !Number.isFinite(clientY)) {
              return;
            }

            if (dragState.active) {
              setMousePassthrough(false);
              return;
            }

            const interactive = isPointInsideChatPanel(clientX, clientY) || isPointerOverModel(clientX, clientY);
            setMousePassthrough(!interactive);
          };

          const syncPointerHitModeByScreenPoint = (screenX, screenY, windowX, windowY) => {
            if (!Number.isFinite(screenX) || !Number.isFinite(screenY)) {
              return;
            }

            const offsetX = Number.isFinite(windowX) ? windowX : window.screenX;
            const offsetY = Number.isFinite(windowY) ? windowY : window.screenY;
            const clientX = screenX - offsetX;
            const clientY = screenY - offsetY;
            hasPointerSample = true;
            lastPointerClientX = clientX;
            lastPointerClientY = clientY;
            syncPointerHitMode(clientX, clientY);
          };

          const pollCursorPosition = async () => {
            if (cursorPollInFlight) {
              return;
            }

            cursorPollInFlight = true;
            try {
              const point = await ipcRenderer.invoke("pet:window:get-cursor-position");
              if (!point || typeof point !== "object") {
                return;
              }

              syncPointerHitModeByScreenPoint(
                Number(point.x),
                Number(point.y),
                Number(point.windowX),
                Number(point.windowY)
              );
            } catch {
              // ignore
            } finally {
              cursorPollInFlight = false;
            }
          };

          const startCursorPolling = () => {
            if (cursorPollTimer) {
              clearInterval(cursorPollTimer);
              cursorPollTimer = 0;
            }

            cursorPollTimer = window.setInterval(() => {
              void pollCursorPosition();
            }, CURSOR_POLL_INTERVAL_MS);
            void pollCursorPosition();
          };

          const stopCursorPolling = () => {
            if (!cursorPollTimer) {
              return;
            }
            clearInterval(cursorPollTimer);
            cursorPollTimer = 0;
          };

          const runTapMotion = (area) => {
            if (area === "head") {
              runStateAction({
                status: "tap-head",
                expression: "Blushing",
                motionGroup: motionBinding.tapHead,
                durationMs: 1700
              });
            } else {
              runStateAction({
                status: "tap-body",
                expression: "Surprised",
                motionGroup: motionBinding.tapBody,
                durationMs: 1700
              });
            }
          };

          const handleTapInteraction = (area) => {
            if (area !== "head" && area !== "body") {
              return;
            }
            runTapMotion(area);
          };

          const queuePetTap = (area) => {
            if (area !== "head" && area !== "body") {
              return;
            }

            const now = Date.now();
            if (pendingSingleTapTimer && now - lastTapAt <= DOUBLE_TAP_GAP_MS) {
              clearPendingSingleTap();
              lastTapAt = 0;
              setChatVisible(true);
              focusChatInput();
              return;
            }

            lastTapAt = now;
            clearPendingSingleTap();
            pendingSingleTapArea = area;
            pendingSingleTapTimer = setTimeout(() => {
              pendingSingleTapTimer = null;
              const areaToRun = pendingSingleTapArea;
              pendingSingleTapArea = null;
              if (!areaToRun) {
                return;
              }
              handleTapInteraction(areaToRun);
            }, SINGLE_TAP_DELAY_MS);
          };

          const dragState = {
            active: false,
            moved: false,
            startX: 0,
            startY: 0,
            prevX: 0,
            prevY: 0,
            dragDistance: 0
          };

          const stopDragging = () => {
            if (!dragState.active) {
              return;
            }

            if (dragState.moved) {
              suppressTapUntil = Date.now() + 180;
              clearPendingSingleTap();
            }

            dragState.active = false;
            dragState.moved = false;
            dragState.dragDistance = 0;
          };

          const isPointerInChatPanel = (target) =>
            Boolean(isElement(target) && target.closest && target.closest("#chat-panel"));

          window.addEventListener("mousedown", (event) => {
            hasPointerSample = true;
            lastPointerClientX = event.clientX;
            lastPointerClientY = event.clientY;

            if (event.button !== 0) {
              return;
            }
            if (isPointerInChatPanel(event.target)) {
              return;
            }

            dragState.active = true;
            dragState.moved = false;
            dragState.startX = event.screenX;
            dragState.startY = event.screenY;
            dragState.prevX = event.screenX;
            dragState.prevY = event.screenY;
            dragState.dragDistance = 0;
            setMousePassthrough(false);
          });

          window.addEventListener("mousemove", (event) => {
            hasPointerSample = true;
            lastPointerClientX = event.clientX;
            lastPointerClientY = event.clientY;
            syncPointerHitMode(event.clientX, event.clientY);

            if (!dragState.active) {
              return;
            }

            const distance = Math.hypot(event.screenX - dragState.startX, event.screenY - dragState.startY);
            dragState.dragDistance = distance;
            if (distance < DRAG_ACTIVATE_DISTANCE) {
              return;
            }

            const dx = event.screenX - dragState.prevX;
            const dy = event.screenY - dragState.prevY;
            if (dx === 0 && dy === 0) {
              return;
            }

            dragState.moved = true;
            dragState.prevX = event.screenX;
            dragState.prevY = event.screenY;
            ipcRenderer.send("pet:window:move-by", { dx, dy });
          });

          window.addEventListener("mouseup", (event) => {
            const wasActive = dragState.active;
            const wasMoved = dragState.moved;
            stopDragging();
            hasPointerSample = true;
            lastPointerClientX = event.clientX;
            lastPointerClientY = event.clientY;
            syncPointerHitMode(event.clientX, event.clientY);

            if (event.button !== 0 || !wasActive || wasMoved) {
              return;
            }

            if (isPointerInChatPanel(event.target)) {
              return;
            }

            if (Date.now() < suppressTapUntil) {
              return;
            }

            const point = mapClientToCanvasPoint(event.clientX, event.clientY);
            if (!point) {
              return;
            }

            const area = classifyTapArea(point.x, point.y);
            if (!area) {
              return;
            }

            queuePetTap(area);
          });
          window.addEventListener("blur", () => {
            stopDragging();
            clearPendingSingleTap();
            setMousePassthrough(true);
          });
          window.addEventListener("mouseleave", (event) => {
            if (event.buttons === 0) {
              stopDragging();
              setMousePassthrough(true);
            }
          });
          window.addEventListener("mouseenter", (event) => {
            hasPointerSample = true;
            lastPointerClientX = event.clientX;
            lastPointerClientY = event.clientY;
            syncPointerHitMode(event.clientX, event.clientY);
          });

          rootEl.addEventListener(
            "wheel",
            (event) => {
              if (isPointerInChatPanel(event.target)) {
                return;
              }
              if (Math.abs(event.deltaY) < 0.01) {
                return;
              }

              event.preventDefault();
              const direction = event.deltaY < 0 ? 1 : -1;
              const nextScale = clamp(zoomScale + direction * 0.06, 0.65, 1.85);
              if (nextScale === zoomScale) {
                return;
              }

              zoomScale = nextScale;
              saveScalePreference(zoomScale);
              applyModelLayout();
              updateStatus(`scale · ${Math.round(zoomScale * 100)}%`);
              scheduleStatusBackToBaseline(900);
            },
            {
              passive: false
            }
          );

          fitModel();
          app.stage.addChild(model);

          window.addEventListener("resize", () => {
            app.renderer.resize(window.innerWidth, window.innerHeight);
            stageHitArea.width = app.renderer.width;
            stageHitArea.height = app.renderer.height;
            fitModel();
            if (hasPointerSample) {
              syncPointerHitMode(lastPointerClientX, lastPointerClientY);
            }
          });

          setMousePassthrough(true);
          startCursorPolling();
          window.addEventListener("beforeunload", () => {
            stopCursorPolling();
            setMousePassthrough(false);
          });

          if (chatCloseEl) {
            chatCloseEl.addEventListener("click", () => {
              closeChatPanel();
            });
          }

          if (chatFormEl) {
            chatFormEl.addEventListener("submit", async (event) => {
              event.preventDefault();
              if (!chatInputEl) {
                return;
              }

              const text = chatInputEl.value.trim();
              if (!text) {
                focusChatInput();
                return;
              }

              setChatVisible(true);
              appendChatMessage("user", text);
              chatInputEl.value = "";

              const pendingEl = appendChatMessage("assistant", "思考中...", {
                pending: true
              });
              setChatSubmitting(true);
              const requestToken = ++chatRequestToken;

              try {
                const response = await ipcRenderer.invoke("pet:chat:send", {
                  text
                });
                if (requestToken !== chatRequestToken) {
                  return;
                }

                const replyText =
                  response &&
                  typeof response === "object" &&
                  typeof response.replyText === "string" &&
                  response.replyText.trim().length > 0
                    ? response.replyText.trim()
                    : "我听见啦。";

                if (pendingEl) {
                  pendingEl.classList.remove("pending");
                  pendingEl.textContent = replyText;
                } else {
                  appendChatMessage("assistant", replyText);
                }
              } catch (error) {
                const message =
                  error && typeof error === "object" && "message" in error
                    ? String(error.message)
                    : "处理消息时出错，请稍后再试";
                if (pendingEl) {
                  pendingEl.classList.remove("pending");
                  pendingEl.textContent = message;
                } else {
                  appendChatMessage("assistant", message);
                }
              } finally {
                if (requestToken === chatRequestToken) {
                  setChatSubmitting(false);
                  focusChatInput();
                }
              }
            });
          }

          window.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && isChatVisible()) {
              closeChatPanel();
            }
          });

          window.addEventListener("contextmenu", (event) => {
            if (isPointerInChatPanel(event.target)) {
              return;
            }

            event.preventDefault();
            ipcRenderer.send("pet:menu:show", {
              x: Math.round(event.x),
              y: Math.round(event.y)
            });
          });

          enterIdle(true);

          ipcRenderer.on("pet:event", (_event, data) => {
            if (!data || typeof data !== "object") {
              return;
            }

            if (data.type === "thinking") {
              if (data.value === "start") {
                thinkingActive = true;
                applyThinkingState();
              } else if (data.value === "stop") {
                thinkingActive = false;
                if (!speechActive) {
                  enterIdle(false);
                }
              }
              return;
            }

            if (data.type === "talking") {
              runStateAction({
                status: "talking",
                motionGroup: talkingMotionGroup,
                syntheticLipSyncMs: 1400,
                pulse: true,
                durationMs: 1650
              });
              return;
            }

            if (data.type === "emotion") {
              const emotion = typeof data.value === "string" ? data.value.trim().toLowerCase() : "";
              const mapping = {
                happy: { expression: "Smile", motionGroup: motionBinding.happy },
                sad: { expression: "Sad", motionGroup: motionBinding.sad, motionIndex: 0 },
                angry: { expression: "Angry", motionGroup: motionBinding.angry },
                surprised: { expression: "Surprised", motionGroup: motionBinding.surprised },
                shy: { expression: "Blushing", motionGroup: motionBinding.shy },
                excited: { expression: "Smile", motionGroup: motionBinding.excited },
                calm: { expression: "Normal", motionGroup: idleMotionGroup },
                idle: { expression: "Normal", motionGroup: idleMotionGroup }
              };

              const action = mapping[emotion] || mapping.idle;
              runStateAction({
                status: `emotion · ${emotion || "idle"}`,
                expression: action.expression,
                motionGroup: action.motionGroup,
                motionIndex: action.motionIndex,
                durationMs: 1850
              });
              return;
            }

            if (data.type === "speech") {
              playPetSpeech(data.audioBase64, data.mimeType);
            }
          });
        } catch (error) {
          console.error(error);
          const reason = error && error.message ? `load-error:${String(error.message).slice(0, 42)}` : "load-error";
          showFallback(reason);
        }
      }

      boot();
    </script>
  </body>
</html>
