<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yobi Pet</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: "Helvetica Neue", "PingFang SC", sans-serif;
      }

      #root {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      #status {
        position: absolute;
        bottom: 12px;
        left: 12px;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.45);
        color: #fff;
        font-size: 12px;
        z-index: 10;
      }

      #fallback {
        width: 220px;
        height: 220px;
        display: none;
        align-items: center;
        justify-content: center;
        background: transparent;
        color: #2f2014;
        font-weight: 700;
      }

      .badge {
        border-radius: 999px;
        padding: 8px 14px;
        background: rgba(242, 176, 106, 0.85);
        box-shadow: 0 16px 42px rgba(0, 0, 0, 0.25);
      }

      .pulse {
        animation: pulse 0.45s ease-in-out 3;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.04);
        }
        100% {
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="fallback"></div>
      <div id="status">idle</div>
    </div>

    <script>
      const { ipcRenderer } = require("electron");
      const fs = require("node:fs");
      const path = require("node:path");

      const statusEl = document.getElementById("status");
      const fallbackEl = document.getElementById("fallback");
      const rootEl = document.getElementById("root");

      const params = new URLSearchParams(window.location.search);
      const modelDir = params.get("modelDir") || "";
      const appPath = params.get("appPath") || "";
      const PET_SCALE_STORAGE_KEY = "yobi.pet.scale.v1";

      const updateStatus = (text) => {
        statusEl.textContent = text;
      };

      const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

      const readScalePreference = () => {
        try {
          const raw = localStorage.getItem(PET_SCALE_STORAGE_KEY);
          if (!raw) {
            return 1;
          }

          const parsed = Number(raw);
          if (!Number.isFinite(parsed)) {
            return 1;
          }

          return clamp(parsed, 0.65, 1.85);
        } catch {
          return 1;
        }
      };

      const saveScalePreference = (value) => {
        try {
          localStorage.setItem(PET_SCALE_STORAGE_KEY, String(clamp(value, 0.65, 1.85)));
        } catch {}
      };

      const normalizeHitAreas = (areas) => {
        if (!Array.isArray(areas)) {
          return [];
        }

        return areas
          .filter((value) => typeof value === "string")
          .map((value) => value.trim());
      };

      const walkFiles = (baseDir) => {
        const result = [];
        if (!baseDir || !fs.existsSync(baseDir)) {
          return result;
        }

        const stack = [baseDir];
        while (stack.length > 0) {
          const dir = stack.pop();
          let entries = [];

          try {
            entries = fs.readdirSync(dir, { withFileTypes: true });
          } catch {
            continue;
          }

          for (const entry of entries) {
            const fullPath = path.join(dir, entry.name);
            if (entry.isDirectory()) {
              stack.push(fullPath);
              continue;
            }

            if (entry.isFile()) {
              result.push(fullPath);
            }
          }
        }

        return result;
      };

      const pickFile = (patternFn) => {
        const files = walkFiles(modelDir);
        return files.find(patternFn) || null;
      };

      const showFallback = (reason) => {
        fallbackEl.style.display = "flex";
        fallbackEl.innerHTML = `<div class="badge">Yobi</div>`;
        updateStatus(`fallback · ${reason}`);
      };

      const loadScript = (src) =>
        new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.onload = () => resolve();
          script.onerror = () => reject(new Error(`Failed to load ${src}`));
          document.head.appendChild(script);
        });

      const resolveCubismCoreCandidates = () => {
        const candidates = [
          path.join(modelDir, "live2dcubismcore.min.js"),
          path.join(modelDir, "runtime", "live2dcubismcore.min.js"),
          appPath ? path.join(appPath, "resources", "live2dcubismcore.min.js") : "",
          appPath ? path.join(appPath, "resources", "vendor", "live2dcubismcore.min.js") : ""
        ].filter(Boolean);

        return Array.from(new Set(candidates));
      };

      const loadCubismCore = async () => {
        const candidates = resolveCubismCoreCandidates();
        for (const filePath of candidates) {
          if (!fs.existsSync(filePath)) {
            continue;
          }

          try {
            await loadScript(`file://${encodeURI(filePath)}`);
            if (window.Live2DCubismCore) {
              return { ok: true, source: filePath };
            }
          } catch {}
        }

        try {
          await loadScript("https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js");
          if (window.Live2DCubismCore) {
            return { ok: true, source: "cdn" };
          }
        } catch {}

        return { ok: false };
      };

      const loadRuntime = async () => {
        let PIXI = null;
        let Live2DModel = null;

        try {
          PIXI = require("pixi.js");
          window.PIXI = PIXI;
        } catch {}

        try {
          const mod = require("pixi-live2d-display/cubism4");
          Live2DModel = mod?.Live2DModel || null;
        } catch {}

        if (!Live2DModel) {
          try {
            const mod = require("pixi-live2d-display");
            Live2DModel = mod?.Live2DModel || mod?.default?.Live2DModel || null;
          } catch {}
        }

        if (!PIXI || !Live2DModel) {
          try {
            const coreState = await loadCubismCore();
            if (!coreState.ok) {
              return {
                error: "missing-cubism-core"
              };
            }

            await loadScript("../node_modules/pixi.js/dist/browser/pixi.min.js");
            await loadScript("../node_modules/pixi-live2d-display/dist/cubism4.min.js");
            PIXI = window.PIXI;
            Live2DModel = window.PIXI?.live2d?.Live2DModel || null;
          } catch (error) {
            return {
              error: error && error.message ? String(error.message) : "script-load-failed"
            };
          }
        }

        if (!PIXI || !Live2DModel) {
          return {
            error: "runtime-not-ready"
          };
        }

        return { PIXI, Live2DModel };
      };

      async function boot() {
        const modelJsonPath = pickFile((file) => file.endsWith(".model3.json"));
        if (!modelJsonPath) {
          showFallback("missing-model3.json");
          return;
        }

        try {
          const runtime = await loadRuntime();
          if (!runtime || !runtime.PIXI || !runtime.Live2DModel) {
            const reason = runtime && runtime.error ? runtime.error : "missing-deps";
            showFallback(`missing-deps:${reason}`);
            return;
          }
          const { PIXI, Live2DModel } = runtime;

          const app = new PIXI.Application({
            width: window.innerWidth,
            height: window.innerHeight,
            transparent: true,
            autoStart: true,
            antialias: true
          });

          rootEl.appendChild(app.view);

          const model = await Live2DModel.from(`file://${encodeURI(modelJsonPath)}`, {
            autoInteract: false
          });
          model.interactive = true;

          let baseScale = 0.11;
          let zoomScale = readScalePreference();
          let statusResetTimer = null;
          let suppressTapUntil = 0;
          let activeAudio = null;

          const scheduleIdleStatus = () => {
            if (statusResetTimer) {
              clearTimeout(statusResetTimer);
            }

            statusResetTimer = setTimeout(() => updateStatus("idle"), 1400);
          };

          const pulseModel = () => {
            rootEl.classList.add("pulse");
            setTimeout(() => rootEl.classList.remove("pulse"), 1600);
          };

          const stopCurrentAudio = () => {
            if (!activeAudio) {
              return;
            }

            try {
              activeAudio.pause();
              activeAudio.src = "";
              activeAudio.load();
            } catch {}

            activeAudio = null;
          };

          const playPetSpeech = (audioBase64, mimeType) => {
            const payload = typeof audioBase64 === "string" ? audioBase64.trim() : "";
            if (!payload) {
              return;
            }

            stopCurrentAudio();

            const audio = new Audio(`data:${mimeType || "audio/mpeg"};base64,${payload}`);
            activeAudio = audio;
            audio.volume = 1;

            audio.onplay = () => {
              pulseModel();
              updateStatus("talking");
            };

            audio.onended = () => {
              if (activeAudio === audio) {
                activeAudio = null;
              }
              scheduleIdleStatus();
            };

            audio.onerror = () => {
              if (activeAudio === audio) {
                activeAudio = null;
              }
              updateStatus("speech-error");
              scheduleIdleStatus();
            };

            audio.play().catch(() => {
              if (activeAudio === audio) {
                activeAudio = null;
              }
              updateStatus("speech-blocked");
              scheduleIdleStatus();
            });
          };

          const applyModelLayout = () => {
            const scale = clamp(baseScale * zoomScale, 0.03, 0.42);
            model.scale.set(scale);
            model.x = app.screen.width / 2;
            model.y = app.screen.height * 0.56;
          };

          const fitModel = () => {
            model.anchor.set(0.5, 0.5);
            model.scale.set(1);

            let nextScale = 0.11;
            try {
              const bounds = model.getLocalBounds();
              if (bounds.width > 0 && bounds.height > 0) {
                const targetWidth = app.screen.width * 0.72;
                const targetHeight = app.screen.height * 0.84;
                nextScale = Math.min(targetWidth / bounds.width, targetHeight / bounds.height);
                nextScale = clamp(nextScale, 0.05, 0.2);
              }
            } catch {}

            baseScale = nextScale;
            applyModelLayout();
          };

          const runTapMotion = (hitAreas) => {
            const normalizedAreas = hitAreas
              .filter((area) => typeof area === "string" && area.length > 0)
              .map((area) => area.toLowerCase());
            if (normalizedAreas.some((area) => area.includes("head") || area.includes("face"))) {
              model.motion("TapHead");
            } else {
              model.motion("TapBody");
            }

            updateStatus("tap");
            scheduleIdleStatus();
          };

          const dragState = {
            active: false,
            moved: false,
            startX: 0,
            startY: 0,
            prevX: 0,
            prevY: 0
          };

          const stopDragging = () => {
            if (!dragState.active) {
              return;
            }

            if (dragState.moved) {
              suppressTapUntil = Date.now() + 180;
            }

            dragState.active = false;
            dragState.moved = false;
          };

          window.addEventListener("mousedown", (event) => {
            if (event.button !== 0) {
              return;
            }

            dragState.active = true;
            dragState.moved = false;
            dragState.startX = event.screenX;
            dragState.startY = event.screenY;
            dragState.prevX = event.screenX;
            dragState.prevY = event.screenY;
          });

          window.addEventListener("mousemove", (event) => {
            if (!dragState.active) {
              return;
            }

            const distance = Math.hypot(event.screenX - dragState.startX, event.screenY - dragState.startY);
            if (distance < 3) {
              return;
            }

            const dx = event.screenX - dragState.prevX;
            const dy = event.screenY - dragState.prevY;
            if (dx === 0 && dy === 0) {
              return;
            }

            dragState.moved = true;
            dragState.prevX = event.screenX;
            dragState.prevY = event.screenY;
            ipcRenderer.send("pet:window:move-by", { dx, dy });
          });

          window.addEventListener("mouseup", stopDragging);
          window.addEventListener("blur", stopDragging);
          window.addEventListener("mouseleave", (event) => {
            if (event.buttons === 0) {
              stopDragging();
            }
          });

          rootEl.addEventListener(
            "wheel",
            (event) => {
              if (Math.abs(event.deltaY) < 0.01) {
                return;
              }

              event.preventDefault();
              const direction = event.deltaY < 0 ? 1 : -1;
              const nextScale = clamp(zoomScale + direction * 0.06, 0.65, 1.85);
              if (nextScale === zoomScale) {
                return;
              }

              zoomScale = nextScale;
              saveScalePreference(zoomScale);
              applyModelLayout();
              updateStatus(`scale · ${Math.round(zoomScale * 100)}%`);
              scheduleIdleStatus();
            },
            {
              passive: false
            }
          );

          fitModel();
          app.stage.addChild(model);

          window.addEventListener("resize", () => {
            app.renderer.resize(window.innerWidth, window.innerHeight);
            fitModel();
          });

          updateStatus("idle");

          model.on("pointertap", (event) => {
            if (Date.now() < suppressTapUntil) {
              return;
            }

            const point = event?.data?.global;
            if (!point || !Number.isFinite(point.x) || !Number.isFinite(point.y)) {
              return;
            }

            const rawHitAreas = model.hitTest(point.x, point.y);
            if (!Array.isArray(rawHitAreas) || rawHitAreas.length === 0) {
              return;
            }

            const hitAreas = normalizeHitAreas(rawHitAreas);

            const bounds = model.getBounds();
            if (bounds.width > 0 && bounds.height > 0) {
              const insetX = bounds.width * 0.08;
              const insetTop = bounds.height * 0.04;
              const insetBottom = bounds.height * 0.04;
              const insideCoreArea =
                point.x >= bounds.x + insetX &&
                point.x <= bounds.x + bounds.width - insetX &&
                point.y >= bounds.y + insetTop &&
                point.y <= bounds.y + bounds.height - insetBottom;

              if (!insideCoreArea) {
                return;
              }
            }

            runTapMotion(hitAreas);
          });

          ipcRenderer.on("pet:event", (_event, data) => {
            if (!data || typeof data !== "object") {
              return;
            }

            if (data.type === "talking") {
              pulseModel();
              model.motion("FlickHair");
              updateStatus("talking");
              scheduleIdleStatus();
              return;
            }

            if (data.type === "emotion") {
              const mapping = {
                happy: "FlickHair",
                sad: "TapBody",
                shy: "TapHead",
                angry: "TapBody",
                excited: "FlickHair",
                calm: "TapHead",
                idle: "Idle"
              };

              const motion = mapping[data.value] || "TapBody";
              model.motion(motion);
              updateStatus(`emotion · ${data.value}`);
              scheduleIdleStatus();
              return;
            }

            if (data.type === "speech") {
              playPetSpeech(data.audioBase64, data.mimeType);
            }
          });
        } catch (error) {
          console.error(error);
          const reason = error && error.message ? `load-error:${String(error.message).slice(0, 42)}` : "load-error";
          showFallback(reason);
        }
      }

      boot();
    </script>
  </body>
</html>
